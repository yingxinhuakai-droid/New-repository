<script>
var SCENES = [{"id": "s1", "icon": "📖", "title": "教材讲义研发", "sub": "考纲拆解→分层讲义→三级审核→思维导图/背诵手册", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">教材讲义研发是教研团队的核心生产环节。教研老师对照官方考纲，将法规、管理、技术、实务四大科目按基础、提升、冲刺三个层级编写讲义、考点清单和背诵手册。<br><br><strong>参与角色：</strong>学科负责人（把控方向）→ 教研编写老师（执笔初稿）→ 审核老师（三级校对法条/计算/实务要点）→ 排版老师（统一格式）<br><br><strong>典型工作流：</strong>每年考纲发布后，学科负责人划章节分工 → 教研老师按三层编写 → 三级审核校对 → 统一排版定稿 → 按考纲年份版本归档。</div><div class=\"def-flow\"><div class=\"step\">考纲拆解</div><div class=\"step\">章节分工</div><div class=\"step\">分层编写</div><div class=\"step\">三级审核</div><div class=\"step\">排版定档</div><div class=\"step\">版本归档</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 从零写初稿耗时惊人</h6><p>每章讲义8000-12000字，一位老师花2-3天才能完成一章初稿，全年四科数百章内容，初稿编写占掉教研70%以上精力。</p></div><div class=\"pain-card\"><h6>🔥 法条编号容易出错</h6><p>讲义中大量引用法条，编号、条款序号手抄极易出错，一个错误可能导致学员考试答错，但人工核查数百页中的每个法条编号几乎不可能。</p></div><div class=\"pain-card\"><h6>🔥 三层分级标准不统一</h6><p>基础/提升/冲刺三层边界模糊，不同老师写的'基础版'深浅不一——有的过深让零基础学员看不懂，有的过浅变成大纲摘要。</p></div><div class=\"pain-card\"><h6>🔥 考纲变动后返工成本高</h6><p>每年考纲微调后，需逐章逐节排查受影响内容——法条废止、考点新增、分值调整——手动比对新旧考纲再批量修改，效率极低。</p></div><div class=\"pain-card\"><h6>🔥 配套素材制作费时</h6><p>讲义写完还要单独做思维导图、速记口诀、易混对比表、背诵卡片等，这些辅助材料制作耗时但不产生核心知识增量，却缺一不可。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">✍️</div><div class=\"e-body\"><h6>智能内容生成→初稿从「写」变「审改」</h6><p>教研老师提供考纲章节和参考教材内容，阿七按指定层级输出结构化讲义初稿（含法条引用、考点提炼、易错提醒），教研只需审核修改。</p><span class=\"e-result\">单章用时：2-3天→2-3小时</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔍</div><div class=\"e-body\"><h6>联网检索+文件读取→法条精准核对</h6><p>阿七联网搜索最新法条原文，逐条核对讲义中的法条编号、条款序号、规范标准编号是否准确，输出逐条核对清单。</p><span class=\"e-result\">法条错误率趋近于零</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📋</div><div class=\"e-body\"><h6>考纲新旧对比→变动点自动标注</h6><p>新旧两版考纲同时丢给阿七，逐条对比输出增删改考点清单，标注每项变动对现有讲义的影响范围，生成待修改资料清单。</p><span class=\"e-result\">考纲比对：1-2天→30分钟</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🧩</div><div class=\"e-body\"><h6>配套素材一键生成</h6><p>讲义定稿后，阿七自动生成对应章节的思维导图（Markdown格式）、速记口诀、易混法条对比表、背诵卡片，无需教研单独花时间制作。</p><span class=\"e-result\">配套素材：半天→10分钟</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：分层讲义初稿生成</div><div class=\"pc-body\">你是一位中级注册安全工程师教研老师，专精[科目名称]。\n请编写[章节名称]的[基础/提升/冲刺]层级讲义。\n\n参考考纲与教材：\n[粘贴考纲章节+教材原文]\n\n输出结构：\n1. 本章考情分析（近5年分值、题型、命题规律）\n2. 考点清单（掌握/熟悉/了解三级）\n3. 逐考点精讲（法条原文引用、关键词标注、易错提醒）\n4. 小结+思维导图框架\n\n要求：法条引用精确到条/款，基础层重概念理解，冲刺层重应试技巧。</div><div class=\"pc-copy\">复制模板，替换[ ]内容即可使用</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：法条编号逐条核对</div><div class=\"pc-body\">请核对以下讲义中所有法条/规范编号是否准确：\n[粘贴讲义文本]\n\n逐条列出，标注：✅ 正确 / ❌ 错误（附正确编号）\n额外检查：是否有已废止或更新的法条需要替换</div><div class=\"pc-copy\">三级审核的第一轮机审</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：配套素材一键生成</div><div class=\"pc-body\">基于以下讲义内容生成配套学习素材：\n[粘贴定稿讲义]\n\n输出：\n1. 速记口诀（3-5条，押韵易记，含法条关键词）\n2. 易混淆考点对比表（表格，含适用条件/时限/责任人/处罚）\n3. 思维导图大纲（Markdown缩进格式）</div><div class=\"pc-copy\">讲义定稿后一键产出全套配套</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 编写《安全生产许可证》章节基础层讲义</div><div class=\"case-body\"><p>教研老师小王负责编写2026版注安法规科目讲义。本章'安全生产许可证的取得与管理'属于高频考点（年均4-6分），需按基础层编写，面向零基础学员。小王打开阿七，直接粘贴考纲要求与参考教材内容。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">你是一位中级注册安全工程师教研老师。请帮我编写《安全生产法》'安全生产许可证'章节的基础层讲义。考纲要求：取得条件、有效期、延期变更、监督管理。参考教材：[粘贴教材约2000字]。请按：考情分析→考点清单→逐考点精讲→小结，四部分输出。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出约6000字结构化讲义：①近5年命题规律与分值分布（年均4-6分，以单选多选为主）②6个考点按掌握/熟悉/了解三级归类 ③逐考点精讲含法条原文引用（精确到《安全生产许可证条例》第几条）、关键词标注、典型基础例题 ④本章知识地图小结。</div></div></div><p><strong>🔁 迭代追问：</strong>小王审阅后发现内容准确但基础层讲得太深，零基础学员信息密度过高。于是迭代追问：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">内容没问题，但基础层太深了。请调整：①每个考点加一句大白话解释 ②法条原文移到「拓展阅读」框里，正文只讲核心要点 ③例题只保留1道最基础的 ④增加2个生活类比帮助零基础理解</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">重新输出了调整版：每个考点开头加了白话解释（如'安全生产许可证就是企业的安全营业执照，没它不能开工'），法条原文移到灰色拓展框仅作参考，正文只讲'条件→流程→时限'三要素，例题精简为1道基础判断题，并增加了2个生活类比（开车驾照=安全许可证，不拿证不能上路）。</div></div></div><p><strong>🔁 二次迭代：</strong>小王满意了，接着一键生成配套素材：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">基于刚才的讲义，生成：①速记口诀 ②易混淆对比表（安全生产许可证vs营业执照vs安全设施三同时）③思维导图大纲</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">输出3条押韵口诀（如'许可条件十三项，安全投入不能忘，延期提前三个月，变更三十日内办'）+ 三列对比表（适用条件/办理时限/主管部门/逾期后果/法律依据）+ Markdown缩进格式思维导图。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：一份约5000字的基础层讲义（含白话解释、生活类比、基础例题）+ 3条速记口诀 + 1张易混对比表 + 思维导图大纲。全程约2小时（含审核修改），传统方式需2-3天。小王将定稿讲义发给阿七写入飞书知识库归档。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">讲义定稿→课件制作（场景3：课程磨课）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">考点清单→题库命题标签（场景2：题库命题）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">易混对比表→答疑知识库（场景4：答疑标准化）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">考情分析↔学情诊断对照（场景6：学情诊断）</div></div></div>"}, {"id": "s2", "icon": "📝", "title": "题库命题与刷题体系", "sub": "原创命题→标准解析→变式训练→智能组卷→错题分析", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">题库命题是检验学员考点掌握程度的核心手段。教研团队围绕注安专属标签题库，收纳历年真题、模拟题、实务案例题，筛选剔除老旧超纲题型，自主改编和原创贴合考情的新题，分层配置课堂练习、课后作业、单元模考和考前冲刺套卷。<br><br><strong>参与角色：</strong>命题老师（出题+解析编写）→ 审核老师（核对答案与法条依据）→ 标签管理员（维护考点标签体系）→ 数据分析师（错题统计与报告输出）</div><div class=\"def-flow\"><div class=\"step\">考点标签维护</div><div class=\"step\">命题/改编</div><div class=\"step\">标准解析编写</div><div class=\"step\">审核入库</div><div class=\"step\">分层配置</div><div class=\"step\">错题统计</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 原创命题质量参差不齐</h6><p>命题老师水平不一——有的题干表述不严谨、选项干扰性不够、答案存在争议——导致学员做题时产生困惑甚至投诉。</p></div><div class=\"pain-card\"><h6>🔥 标准解析编写极其耗时</h6><p>每道题的解析需要标注法条依据、计算步骤、实务得分框架，一道案例题的完整解析往往需要30-60分钟，数百道题的解析编写是巨大工作量。</p></div><div class=\"pain-card\"><h6>🔥 老旧题目清理不及时</h6><p>题库中积累了大量历年真题，但部分题目引用的法条已废止或修改，学员做到过时题目会被误导，但人工逐题排查更新工作量极大。</p></div><div class=\"pain-card\"><h6>🔥 变式训练缺乏系统性</h6><p>高频错题需要配套变式训练来攻克概念混淆，但老师手动出变式题效率低、角度单一，难以做到多角度覆盖。</p></div><div class=\"pain-card\"><h6>🔥 组卷依赖人工经验</h6><p>组卷需要平衡章节权重、难度分布、题型比例，全靠老师凭经验手动选题拼卷，容易出现难度忽高忽低、知识点覆盖不均的问题。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">✍️</div><div class=\"e-body\"><h6>原创命题+标准解析一条龙</h6><p>给阿七一个考点+难度要求，直接生成单选/多选/案例分析题+标准答案+完整解析（含法条依据/计算步骤/得分点/易错提醒），教研审核后即可入库。</p><span class=\"e-result\">单题命题+解析：1小时→5分钟</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔄</div><div class=\"e-body\"><h6>老旧题目智能改编</h6><p>将过时真题丢给阿七，按新考纲要求改编题干、替换废止法条、调整选项，保留经典考查角度的同时更新到最新规范。</p><span class=\"e-result\">题目更新效率提升10倍</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🎯</div><div class=\"e-body\"><h6>变式训练批量生成</h6><p>一道高频错题→阿七生成3-5道同考点不同角度的变式题（概念辨析/情景应用/计算变形/法条反向/综合对比），专门攻克概念混淆。</p><span class=\"e-result\">变式题包：2小时→10分钟</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📊</div><div class=\"e-body\"><h6>智能组卷+采分细则</h6><p>按章节权重+难度分布+题型比例要求自动搭配完整试卷，案例题自动拆解每个踩分点、分步分值、得分关键词。</p><span class=\"e-result\">组卷+采分细则：半天→20分钟</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：原创命题+完整解析</div><div class=\"pc-body\">你是一位中级注安命题专家。\n请围绕考点「[考点名称]」出一道[单选/多选/案例分析]题，难度：[基础/提升/冲刺]。\n\n要求：\n1. 题干情景真实、表述严谨\n2. 选项干扰性强、无争议\n3. 输出：题目→答案→解析（含法条依据精确到条/款、计算步骤、易错提醒）\n4. 若为案例题，附采分细则（每个踩分点+分值+得分关键词）</div><div class=\"pc-copy\">单题命题标准模板</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：老旧题目改编</div><div class=\"pc-body\">以下是一道使用旧法条的真题，请按2026年最新考纲和现行法规改编：\n[粘贴原题]\n\n改编要求：\n1. 替换已废止/修改的法条为新法条\n2. 调整选项使其符合新规范\n3. 重写解析，标注新法条依据\n4. 保留原题考查角度，不改变核心考点</div><div class=\"pc-copy\">题库更新维护专用</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：变式训练批量生成</div><div class=\"pc-body\">以下为一道高频错题，请围绕同一考点生成5道变式题：\n错题：[粘贴错题]\n\n5道变式题角度：\n①概念辨析 ②情景应用 ③计算变形 ④法条反向 ⑤综合对比\n\n每道题含：题目+答案+简要解析\n每题标注：考点标签/难度/答案/解析。输出：试卷正文+答案解析附册</div><div class=\"pc-copy\">月度模考/阶段测评一键组卷</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 为高频错点生成变式训练专项包</div><div class=\"case-body\"><p>数据分析显示《安全生产管理》'重大危险源辨识'考点错题率高达62%，是全校最薄弱点。命题老师需快速出5道变式题做专项训练。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">以下为一道高频错题，请围绕同一考点生成5道变式题：\n错题：某企业储罐区有3个汽油储罐，单罐容积200/300/250m³，是否构成重大危险源？\n答案：是\n解析：根据GB18218，总储量750m³>临界量200m³\n请5道变式题角度：概念辨析/情景应用/计算变形/法条反向/综合对比</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">生成5道变式题：①概念辨析'重大危险源vs危险源'判断题 ②情景应用'多储罐混合存储不同危化品辨识'案例 ③计算变形'改变储罐数量和容积重新计算' ④法条反向'给定临界量反推最大允许储量' ⑤综合对比'辨识单元划分+临界量叠加计算'综合题。每题附答案+解析+法条依据。</div></div></div><p><strong>🔁 迭代追问：</strong>老师审阅后觉得题目质量不错，但希望增加难度梯度并补充采分细则：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">5道题质量很好。请补充：①按基础→提升→冲刺排序标注难度 ②案例题（第②⑤题）补充详细采分细则（每步几分、得分关键词）③再生成1套同考点的5道选择题作为课后巩固练习</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">重新输出：5道变式题按基础（①③）→提升（②④）→冲刺（⑤）排序，案例题②补充采分细则（辨识单元划分2分/临界量查询2分/计算过程3分/结论判断1分/法条引用2分），案例题⑤补充采分细则（同理）。额外生成5道选择题（3单选+2多选）含答案解析，标注难度。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1套5道变式训练题（含难度梯度+采分细则）+ 1套5道巩固选择题。命题老师审核法条准确性后入库，配置为'重大危险源辨识'专项训练包，推送给全班学员。全程约15分钟，传统方式需2小时以上。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">题目标签→讲义考点清单（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">错题数据→学情诊断（场景6：学情分析）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">高频错题→补漏微课（场景4：答疑标准化）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">模考套卷→模考体系（场景7：考纲研读）</div></div></div>"}, {"id": "s3", "icon": "🎬", "title": "课程设计与磨课", "sub": "课件框架→教案→讲稿→跨科衔接→磨课评分", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">课程设计是连接教材与学员的桥梁。教研团队依托安工教材题库搭建全年备考课程体系，拆分精讲、习题讲评、案例专项、考前冲刺等课型，明确每科课时重难点与跨科目知识衔接。标准化制作课件与逐节教案，细化法条解读、计算步骤、案例拆解授课逻辑。<br><br><strong>参与角色：</strong>课程设计师（搭建课程体系+课时分配）→ 课件制作老师（PPT+教案）→ 授课讲师（讲稿+试讲）→ 教研组长（听评课+磨课打分）</div><div class=\"def-flow\"><div class=\"step\">课程体系搭建</div><div class=\"step\">课时分配</div><div class=\"step\">课件制作</div><div class=\"step\">教案编写</div><div class=\"step\">讲稿打磨</div><div class=\"step\">集体磨课</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 课件制作从零开始效率低</h6><p>每个课时需要15-25页PPT，包含知识点、案例、互动题、小结，从设计框架到填充内容再到排版，一位老师做一节课件需要4-6小时。</p></div><div class=\"pain-card\"><h6>🔥 教案与课件脱节</h6><p>课件和教案往往由不同人制作，导致课件讲的内容和教案写的教学逻辑不一致——讲师上课时不知道该按课件走还是按教案走。</p></div><div class=\"pain-card\"><h6>🔥 跨科目知识衔接无标准</h6><p>法规、管理、技术、实务四科存在大量交叉考点（如'安全评价'在管理和技术中都考），但各科老师各讲各的，口径不一甚至矛盾，学员无所适从。</p></div><div class=\"pain-card\"><h6>🔥 磨课反馈难量化</h6><p>集体磨课时大家凭感觉提意见，缺少标准化评分维度，'讲得好不好'变成主观判断，新讲师不知道该改什么、改成什么样。</p></div><div class=\"pain-card\"><h6>🔥 授课话术不统一</h6><p>同一道案例题，四位老师可能讲出四种答题方法，学员在直播课和录播课之间切换时产生困惑，影响备考一致性。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">🎨</div><div class=\"e-body\"><h6>课件+教案+讲稿一体化生成</h6><p>给阿七章节讲义，一次性输出PPT逐页内容（含标题/知识点/案例/互动问题/小结）+ 逐节教案（教学目标/重难点/时间分配）+ 逐字讲稿（标注停顿提问/板书/播放视频节点）。</p><span class=\"e-result\">单课时备课：4-6小时→1小时</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔗</div><div class=\"e-body\"><h6>跨科衔接自动标注</h6><p>讲管理的'安全评价'时，阿七自动关联技术科目的对应考点，标注'此处提醒学员回顾技术科目XX章节'，确保四科交叉知识点讲解口径统一。</p><span class=\"e-result\">跨科衔接遗漏率→零</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📋</div><div class=\"e-body\"><h6>标准化磨课评分表</h6><p>阿七根据课型自动生成评分维度表（内容准确性/逻辑清晰度/互动设计/时间控制/案例拆解），评委按表打分，新讲师明确知道改进方向。</p><span class=\"e-result\">磨课反馈从主观→可量化</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🗣️</div><div class=\"e-body\"><h6>统一话术标准脚本</h6><p>同一道案例题，阿七输出标准讲解脚本（答题框架→法条引用→得分要点→常见错误），确保所有讲师讲出来口径一致。</p><span class=\"e-result\">话术统一：无需反复开会</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：课件+教案+讲稿一体化</div><div class=\"pc-body\">你是一位注安课程设计师。\n请基于以下讲义内容，制作[课型]的完整备课包：\n[粘贴章节讲义]\n\n输出三部分：\n1. 【课件PPT】逐页内容（标题/知识点/案例/互动问题/小结，标注页码）\n2. 【教案】教学目标/重难点/时间分配（每环节X分钟）/教学法\n3. 【讲稿】逐字稿，标注[停顿提问][板书][播放视频]等节奏节点\n\n课型：[精讲/习题讲评/案例专项/考前冲刺]\n时长：[X]分钟</div><div class=\"pc-copy\">一节课完整备课包</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：跨科衔接标注</div><div class=\"pc-body\">我正在制作[管理科目]的「安全评价」章节课件。\n请帮我标注与其他科目的交叉衔接点：\n1. [技术科目]中哪些章节涉及相同知识点？\n2. 各科对该知识点的考查角度有何不同？\n3. 在课件中哪些位置应提醒学员回顾其他科目？\n4. 统一四科讲解口径建议</div><div class=\"pc-copy\">确保四科交叉考点口径一致</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：磨课评分表</div><div class=\"pc-body\">请为[课型]课生成标准化磨课评分表：\n\n评分维度（5-8个），每个维度：\n- 评分标准（优/良/中/差各对应什么表现）\n- 分值权重\n- 典型问题提示\n\n附加：新讲师常见问题清单（3-5条）</div><div class=\"pc-copy\">集体磨课直接用</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 制作《危险化学品安全管理》精讲课完整备课包</div><div class=\"case-body\"><p>教研组需要为讲师老张制作一节90分钟的精讲课——'危险化学品安全管理'，属于管理科目高频章节。课程设计师小李打开阿七，将定稿讲义发给阿七。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">你是一位注安课程设计师。请基于以下讲义内容，制作精讲课的完整备课包：\n[粘贴《危险化学品安全管理》讲义约3000字]\n\n输出：1.课件PPT逐页内容 2.教案（教学目标/重难点/时间分配）3.逐字讲稿\n课型：精讲课，时长：90分钟</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出完整备课包：①课件22页（封面→学习目标→考情分析→5个知识模块→每模块含知识点+案例+互动题→本章小结→课后作业）②教案（教学目标3条/重难点各3个/6个环节时间分配：导入5min+精讲60min+案例演练15min+总结5min+布置作业5min）③逐字讲稿约8000字，标注了8处[停顿提问]、5处[板书]、2处[播放视频]节点。</div></div></div><p><strong>🔁 迭代追问：</strong>小李审阅后觉得课件内容好但互动设计不够，案例拆解也太简略。于是追问：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">课件框架很好，请优化：①每3-4页加一个互动设计（提问/投票/小练习），标注互动类型和预计时间 ②案例演练环节从1个增加到2个，第一个偏基础概念、第二个偏综合应用 ③讲稿中案例拆解部分补充'答题框架→法条引用→得分要点'三步走话术</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">优化后输出：①课件增加5处互动节点（知识提问2处/投票1处/小练习2处），每处标注预计2-3分钟 ②案例演练增加到2个（案例一：危化品分类辨识-基础；案例二：储存安全管理综合分析-应用），每个含题干+参考答案+讲解要点 ③讲稿案例拆解补充三步走话术模板。</div></div></div><p><strong>🔁 二次迭代：</strong>备课包定稿后，小李还生成了跨科衔接标注和磨课评分表：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">基于这节课，再帮我：①标注与技术科目危化品章节的交叉衔接点 ②生成精讲课磨课评分表</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">①输出4个交叉衔接点（危化品分类标准/储存安全要求/运输安全管理/应急处置），每个标注管理科目vs技术科目考查角度差异+课件中应提醒回顾的位置+统一口径建议。②输出6维度评分表（内容准确性20%/逻辑清晰度20%/互动设计15%/时间控制15%/案例拆解20%/板书规范10%），每维度4级标准+新讲师常见问题5条。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份22页课件PPT内容+1份教案+1份8000字逐字讲稿+跨科衔接标注+磨课评分表。讲师老张拿到后直接用于集体磨课，磨课评分一次性通过（85分），仅需微调2处互动设计。全程约1.5小时（含迭代），传统方式需1-2天。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">讲义内容→备课素材（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">课件互动题→题库命题（场景2：题库命题）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">磨课评分→师资考核（场景5：师资培训）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">案例拆解话术→答疑标准（场景4：答疑标准化）</div></div></div>"}, {"id": "s4", "icon": "💬", "title": "答疑标准化与疑点攻坚", "sub": "标准答案→问答库→共性疑点根因分析→补漏微课", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">答疑标准化是确保教学服务质量一致性的关键环节。教研团队统一中级注安全部习题、案例的标准答案与解析，标注法条依据、计算步骤、实务得分框架，规范答疑引导方式。整理线上线下高频疑问形成问答库统一讲解口径，再结合作业模考数据收集共性疑点，区分根因制作补漏微课。<br><br><strong>参与角色：</strong>答疑老师（日常答疑+收集高频问题）→ 学科负责人（统一答疑口径）→ 教研编写老师（制作补漏微课/专题讲义）→ 数据分析师（疑点数据统计与根因分类）</div><div class=\"def-flow\"><div class=\"step\">标准答案编写</div><div class=\"step\">答疑口径统一</div><div class=\"step\">高频问题收集</div><div class=\"step\">共性疑点分析</div><div class=\"step\">补漏方案制作</div><div class=\"step\">反向优化讲义</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 标准答案口径不统一</h6><p>同一道题不同老师给出不同的答案解析，法条依据引用不一致，甚至出现'两个老师给出两种答题方法'的情况，学员不知道该信谁。</p></div><div class=\"pain-card\"><h6>🔥 高频问题反复回答效率低</h6><p>学员高频疑问（如'重大危险源临界量怎么记'）每天被问十几遍，答疑老师每次都手打一遍回复，大量时间浪费在重复劳动上。</p></div><div class=\"pain-card\"><h6>🔥 共性疑点缺乏根因分析</h6><p>模考后只知道'某道题错了60%'但不知道为什么——是法条记混、计算方法不会、还是案例逻辑差？没有根因分析就无法精准补漏。</p></div><div class=\"pain-card\"><h6>🔥 补漏微课制作跟不上</h6><p>发现共性疑点后需要加急录制补漏微课，但写脚本、做课件、录制的流程太长，等微课上线时学员已经忘了当时的疑问。</p></div><div class=\"pain-card\"><h6>🔥 疑点台账无系统管理</h6><p>疑点发现→分析→补漏→验证改善的闭环没有系统追踪，同一个疑点可能在不同批次反复出现，教研无法形成长效迭代机制。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">📋</div><div class=\"e-body\"><h6>标准答案批量生成+统一口径</h6><p>阿七批量生成每道题的标准答案+解析（法条依据精确到条/款+计算步骤+实务得分框架+易错提醒），确保所有老师答疑口径一致。</p><span class=\"e-result\">答案标准化：1周→1天</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🗂️</div><div class=\"e-body\"><h6>问答知识库一键搭建</h6><p>高频问题列表丢给阿七，批量生成标准解答，构建可搜索的问答库。答疑老师遇到高频问题直接调用标准回复。</p><span class=\"e-result\">重复答疑时间减少80%</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔬</div><div class=\"e-body\"><h6>共性疑点根因分析</h6><p>阿七分析作业/模考数据，识别大面积出错的考点，输出根因分析报告（法条混淆/计算方法不会/案例逻辑差/审题失误），精准定位问题根源。</p><span class=\"e-result\">根因分析：半天→30分钟</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🎬</div><div class=\"e-body\"><h6>补漏微课脚本快速生成</h6><p>针对一个共性疑点，阿七产出10-15分钟微课的完整讲稿+配套例题+课后练习，教研审核后即可录制。</p><span class=\"e-result\">微课筹备：2天→2小时</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：标准答案+解析批量生成</div><div class=\"pc-body\">请为以下习题批量生成标准答案与解析：\n[粘贴题目列表]\n\n每道题输出：\n1. 答案\n2. 法条依据（精确到条/款/项）\n3. 计算步骤（如涉及）\n4. 实务得分框架（如为案例题：每个踩分点+分值+得分关键词）\n5. 易错提醒（1-2句）\n6. 答疑引导话术（如何引导学员自己想到答案）</div><div class=\"pc-copy\">统一全部习题答疑口径</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：高频问答库生成</div><div class=\"pc-body\">以下是学员高频疑问列表，请生成标准解答构建问答库：\n[粘贴问题列表]\n\n每个问题输出：\n- 标准解答（200字以内，通俗易懂）\n- 法条依据\n- 易错点提醒\n- 关联考点标签\n\n格式：问答对，可直接导入知识库</div><div class=\"pc-copy\">搭建答疑知识库</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：共性疑点根因分析</div><div class=\"pc-body\">以下是本次模考的错题数据：\n[粘贴错题数据：题号/错误率/对应考点]\n\n请分析：\n1. 错误率>50%的题目，逐题分析错误根因（法条混淆/计算失误/案例逻辑差/审题失误/超纲）\n2. 按根因分类汇总，找出共性薄弱点\n3. 每个薄弱点给出补漏建议（补漏微课主题/专项练习/讲义修订点）\n4. 输出疑点台账（疑点-根因-整改措施-验证方式）</div><div class=\"pc-copy\">模考后疑点分析标准流程</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 模考后共性疑点分析+补漏微课生成</div><div class=\"case-body\"><p>本月模考结束，数据分析师发现实务科目案例题第3题错误率高达78%，涉及'事故应急救援预案'考点。答疑老师收到大量学员提问，需要快速定位根因并制作补漏方案。教研组长把模考数据发给阿七。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">以下是本次实务科目模考错题数据，请分析共性疑点：\n第3题（案例分析-事故应急救援预案）：错误率78%\n第7题（单选-应急预案备案）：错误率65%\n第12题（多选-应急演练）：错误率52%\n\n请逐题分析错误根因，找出共性薄弱点，给出补漏建议。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">根因分析报告：①第3题根因=案例逻辑差（学员不会拆解应急救援响应流程，只答了预案编制没答响应启动）②第7题根因=法条混淆（应急预案备案层级搞混：县级vs市级vs省级）③第12题根因=概念混淆（应急演练频次记混：综合预案vs专项预案vs现场处置方案演练周期）。共性薄弱点：'事故应急'整章知识体系不清晰。补漏建议：制作1节15分钟微课梳理应急体系+1套专项练习（5题）+讲义修订（增加应急流程对比表）。疑点台账：3个疑点-3个根因-3条整改措施。</div></div></div><p><strong>🔁 迭代追问：</strong>教研组长确认根因分析准确，要求阿七直接生成补漏微课脚本：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">根因分析很准确。请基于'事故应急体系不清晰'这个共性薄弱点，生成一节15分钟的补漏微课：\n1. 微课讲稿（含开场引入→知识梳理→案例演练→总结）\n2. 配套PPT要点（5-8页）\n3. 课后专项练习（5题，含答案解析）\n4. 讲义修订建议（增加哪些对比表/流程图）</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">输出补漏微课完整方案：①讲稿约2500字（开场用真实事故案例引入→梳理'预案编制-备案-演练-响应'四环体系→案例演练用模考第3题重新拆解→总结三步记忆法）②PPT 7页（应急体系全景图/预案分类对比表/备案层级流程图/演练频次速记表/案例拆解/练习/总结）③课后练习5题（预案编制2题+备案1题+演练1题+综合1题，含答案解析）④讲义修订建议（增加'应急预案备案层级对比表'和'应急演练频次速记卡'）。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份根因分析报告+1份15分钟补漏微课讲稿+7页PPT要点+5道课后练习+讲义修订建议。微课录制后3天内上线，学员补漏后该考点正确率从22%提升至78%。疑点台账同步更新，讲义修订建议反馈给编写老师。全程约1小时，传统方式需2-3天。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">标准答案→题库解析（场景2：题库命题）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">补漏微课→直播录课（场景8：直播录课）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">疑点台账→讲义修订（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">共性疑点→学情分析（场景6：学情分析）</div></div></div>"}, {"id": "s5", "icon": "👨‍🏫", "title": "师资培训与赋能", "sub": "培训手册→通关资料→评分表→话术模板→备课督导", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">师资培训是保障教学质量的基础。教研团队负责新讲师注安专业知识通关、授课台风、案例答题话术培训；老教师定期教研会同步最新考点、出题套路。常态化集体试讲、录课评审、随堂听课打分，设立授课考核标准。规范法规条文解读、计算题演算步骤、实务踩分点讲解口径。<br><br><strong>参与角色：</strong>教研组长（制定培训计划+考核标准）→ 学科带头人（专业知识培训+话术规范）→ 新讲师（通关学习+试讲）→ 评委组（听评课打分+反馈整改）</div><div class=\"def-flow\"><div class=\"step\">培训计划制定</div><div class=\"step\">新讲师通关</div><div class=\"step\">试讲磨课</div><div class=\"step\">评分考核</div><div class=\"step\">话术统一</div><div class=\"step\">持续教研</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 新讲师培训周期长</h6><p>新讲师需要掌握注安四科知识体系、授课技巧、案例答题话术，从入职到能独立上课通常需要1-2个月，培训资源投入大。</p></div><div class=\"pain-card\"><h6>🔥 培训资料零散不系统</h6><p>新讲师培训资料散落在各处——讲义在飞书、话术在微信群、评分表在Excel——没有统一的新讲师通关手册，培训质量依赖带教老师的个人水平。</p></div><div class=\"pain-card\"><h6>🔥 话术统一靠开会效率低</h6><p>每次统一话术都要开教研会，一位老师讲一遍其他老师听，会上达成一致但会后各讲各的，需要反复开会反复纠正。</p></div><div class=\"pain-card\"><h6>🔥 备课督导检查不到位</h6><p>教研组长需要检查每位老师的教案、课件、备课笔记，确认不脱离自研讲义、不随意拓展超纲内容，但人工逐个检查耗时而难以常态化。</p></div><div class=\"pain-card\"><h6>🔥 考核标准不透明</h6><p>新讲师不知道'合格'的标准是什么——课件要做到什么程度、讲稿要写多少字、试讲要达到多少分——导致通关准备盲目，反复返工。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">📚</div><div class=\"e-body\"><h6>新讲师通关手册一键生成</h6><p>阿七根据科目和课型，生成完整的新讲师通关手册（知识体系框架+重点考点清单+授课技巧指南+案例答题话术+备课检查清单+考核标准），新讲师一本手册即可系统学习。</p><span class=\"e-result\">培训资料整理：1周→1天</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🗣️</div><div class=\"e-body\"><h6>统一话术标准脚本</h6><p>阿七为每类知识点生成标准讲解脚本（法条解读模板/计算演算步骤/案例踩分点话术），所有讲师统一使用，减少口径分歧。</p><span class=\"e-result\">话术统一会议：3次→0次</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📋</div><div class=\"e-body\"><h6>备课督导自动检查</h6><p>讲师把教案/课件发给阿七，自动检查是否脱离自研讲义、是否超纲拓展、知识点覆盖是否完整，输出检查报告。</p><span class=\"e-result\">备课检查：30分钟/人→5分钟/人</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📊</div><div class=\"e-body\"><h6>考核评分标准化</h6><p>阿七生成标准化考核评分表（内容/逻辑/互动/时间/台风），评委按表打分，新讲师明确知道改进方向。</p><span class=\"e-result\">考核标准从模糊→可量化</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：新讲师通关手册</div><div class=\"pc-body\">请为[科目名称]新讲师生成通关手册：\n\n包含：\n1. 本科目知识体系框架（四章核心脉络）\n2. 必须掌握的20个高频考点清单\n3. 授课技巧指南（开场/互动/案例/总结各环节要点）\n4. 案例答题话术模板（3个典型案例的标准讲解脚本）\n5. 备课检查清单（教案/课件/讲稿各查什么）\n6. 通关考核标准（试讲评分表+合格分数线）</div><div class=\"pc-copy\">新讲师入职第一周发给他</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：统一话术标准脚本</div><div class=\"pc-body\">请为以下知识点生成统一讲解话术脚本：\n知识点：[知识点名称]\n课型：[精讲/习题/案例]\n\n输出：\n1. 标准讲解流程（引入→讲解→举例→互动→总结）\n2. 逐字话术（标注重点强调处、停顿处、板书处）\n3. 常见学员疑问及标准回答（3-5个）\n4. 讲解时长建议</div><div class=\"pc-copy\">确保所有讲师口径一致</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：备课督导自动检查</div><div class=\"pc-body\">请检查以下教案是否符合备课规范：\n[粘贴教案内容]\n\n检查项：\n1. 是否覆盖本课时所有考点？\n2. 是否有脱离自研讲义的内容？（标注超纲处）\n3. 案例答题话术是否与标准脚本一致？\n4. 互动设计是否合理（频率/类型/时长）？\n5. 时间分配是否合理？\n\n输出：检查报告（✅通过/❌需修改，附具体建议）</div><div class=\"pc-copy\">教研组长备课督导用</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 新讲师通关培训全流程赋能</div><div class=\"case-body\"><p>新讲师小刘入职，需要带教培训后2周内通过试讲考核才能上岗。教研组长把培训任务交给阿七——先生成通关手册，再生成话术脚本，最后用备课督导检查小刘的备课质量。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">请为法规科目新讲师生成通关手册，包含：知识体系框架、20个高频考点、授课技巧、案例话术模板、备课检查清单、通关考核标准。科目：安全生产法及相关法规。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出完整通关手册（约8000字）：①法规科目四章框架（安全生产法/矿山安全法/消防法/相关行政法规）②20个高频考点清单（标注考频/分值/难度）③授课技巧（开场3法/互动5式/案例4步/总结3招）④3个典型案例标准讲解脚本（预案备案/事故报告/行政处罚）⑤备课检查清单（6大项18小项）⑥通关考核评分表（6维度，合格线80分）。</div></div></div><p><strong>🔁 迭代追问：</strong>小刘学完手册后开始备课，教研组长让她把教案发给阿七做督导检查：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">请检查以下教案是否符合备课规范：\n[小刘的教案：安全生产法总则章节，约2000字]\n\n检查是否覆盖所有考点、是否超纲、话术是否与标准一致、互动设计是否合理。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">检查报告：①考点覆盖：✅ 覆盖6个考点中的5个，缺少'安全生产方针'考点，建议补充 ②超纲检查：❌ 第3节拓展了'刑法中重大责任事故罪'内容，属于超纲，建议删除 ③话术一致性：⚠️ 案例讲解话术与标准脚本有2处差异（行政处罚程序描述不一致），建议对照修正 ④互动设计：✅ 3处互动设计合理 ⑤时间分配：⚠️ 精讲环节70分钟偏长，建议压缩到60分钟。综合评定：需修改后复审。</div></div></div><p><strong>🔁 二次迭代：</strong>小刘根据报告修改教案后，教研组长又生成了试讲评分表：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">小刘已修改教案，请生成试讲评分表，评委3人，按6维度打分。并给出小刘这类新讲师常见问题提醒。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">输出试讲评分表（内容准确性20分/逻辑清晰20分/互动设计15分/时间控制15分/案例拆解20分/台风表现10分，评委3人各打分取平均，合格线80分）+ 新讲师常见问题5条（语速过快/案例讲解跳步/互动冷场/时间超时/板书不规范），每条附改进建议。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份8000字通关手册+1份备课督导检查报告+1份试讲评分表。小刘根据检查报告修改教案后一次性通过试讲（82分），从入职到上岗仅用12天（传统方式1-2个月）。通关手册沉淀为标准化培训资料，后续新讲师直接复用。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">通关手册→新讲师培训（场景8：直播录课）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">话术脚本→磨课评分（场景3：课程磨课）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">备课检查→讲义内容（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">考核标准→师资管理（场景10：教研复盘）</div></div></div>"}, {"id": "s6", "icon": "📊", "title": "学情分析与错题诊断", "sub": "Excel导入→分层画像→薄弱诊断→错误分类→可视化报告", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">学情分析是数据驱动的教学改进基础。教研团队依据模考分数划分零基础、中等、冲刺拔高学员，出具班级整体薄弱科目、高频失分考点报表。统计全校学员错题TOP榜单，拆解错误原因（法条记混、计算失误、案例分析逻辑差），产出错题分析报告，指导后续教学重点调整。<br><br><strong>参与角色：</strong>数据分析师（成绩数据收集+统计分析）→ 学科负责人（薄弱点诊断+教学调整建议）→ 班主任（分层学员管理+个性化方案）→ 教研组长（报告审阅+资源调配）</div><div class=\"def-flow\"><div class=\"step\">成绩数据收集</div><div class=\"step\">分层画像</div><div class=\"step\">薄弱点诊断</div><div class=\"step\">错题分类统计</div><div class=\"step\">分析报告输出</div><div class=\"step\">教学调整决策</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 数据分析全靠手工Excel</h6><p>每次模考后数据分析师要在Excel里做大量vlookup、数据透视、图表制作，一份完整的学情分析报告需要2-3天，等报告出来时学员已经进入下一阶段学习。</p></div><div class=\"pain-card\"><h6>🔥 分层画像粗糙</h6><p>目前只按总分分层（零基础/中等/拔高），但总分相同的学生薄弱点可能完全不同——有的法规强技术弱，有的计算强案例弱——粗放分层导致个性化方案不精准。</p></div><div class=\"pain-card\"><h6>🔥 错题分析停留在'错了多少'</h6><p>错题统计只到'某题错误率XX%'层面，不深入分析'为什么错'——是法条记混还是计算方法不会——没有根因分析就无法精准补漏。</p></div><div class=\"pain-card\"><h6>🔥 报告可读性差</h6><p>分析报告全是Excel表格和数据，学科负责人和班主任看半天也抓不住重点，无法快速转化为教学行动。</p></div><div class=\"pain-card\"><h6>🔥 数据无法反哺教学</h6><p>学情分析报告和教学调整之间缺少闭环——分析完了、报告出了，但教学计划没有据此调整，同样的薄弱点下次模考依然存在。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">📊</div><div class=\"e-body\"><h6>Excel数据一键分析</h6><p>把模考成绩Excel/CSV拖给阿七，自动完成分层画像、薄弱科目诊断、高频失分考点排名、错误类型分类统计，输出结构化分析报告。</p><span class=\"e-result\">学情报告：2-3天→30分钟</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🎯</div><div class=\"e-body\"><h6>多维度精准分层</h6><p>阿七不仅按总分分层，还按科目/章节/题型维度交叉分析，生成每个学员的'能力雷达图'，精准定位个人薄弱点。</p><span class=\"e-result\">分层精度：3级→多维画像</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔬</div><div class=\"e-body\"><h6>错题根因深度分析</h6><p>阿七对错题TOP榜逐题分析根因（法条混淆/计算失误/案例逻辑差/审题失误/超纲），按根因分类汇总，每个根因给出对应补漏方案。</p><span class=\"e-result\">从'错了多少'到'为什么错'</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📈</div><div class=\"e-body\"><h6>可视化报告自动生成</h6><p>阿七输出含图表的分析报告（成绩分布图/薄弱点热力图/错题根因饼图/学员能力雷达图），班主任和学科负责人一眼抓住重点。</p><span class=\"e-result\">报告可读性从'看半天'→'5分钟抓重点'</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：模考成绩学情分析</div><div class=\"pc-body\">请分析以下模考成绩数据：\n[拖入Excel/CSV文件，或粘贴数据：学员姓名/总分/各科分数/各题得分]\n\n输出：\n1. 整体情况（平均分/最高分/最低分/及格率/分数段分布）\n2. 分层画像（零基础<60/中等60-80/拔高>80，各层人数及特征）\n3. 薄弱科目排名（四科平均分对比，最弱科目详细分析）\n4. 高频失分考点TOP10（按错误率排序）\n5. 教学调整建议（3-5条具体可执行建议）</div><div class=\"pc-copy\">模考后标准分析流程</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：错题根因深度分析</div><div class=\"pc-body\">以下是本次模考错题数据：\n[粘贴数据：题号/错误率/对应考点/科目]\n\n请逐题分析：\n1. 错误根因分类（法条混淆/计算失误/案例逻辑差/审题失误/超纲未学）\n2. 按根因汇总统计（各类占比）\n3. 每个根因给出补漏方案（微课主题/专项练习/讲义修订）\n4. 错题变式训练建议（TOP5错题各出3道变式题角度）</div><div class=\"pc-copy\">从数据到补漏方案一条龙</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：个性化补弱方案</div><div class=\"pc-body\">以下是一位学员的模考数据：\n[粘贴学员各科/各章/各题得分]\n\n请生成个性化补弱方案：\n1. 个人能力画像（强项/弱项/提升空间）\n2. 薄弱章节优先级排序（按分值×难度加权）\n3. 2周补弱计划（每天学什么+做题什么+预计提分）\n4. 推荐资源（对应章节讲义/微课/练习题包）</div><div class=\"pc-copy\">一对一学员定制方案</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 月度模考学情分析全流程</div><div class=\"case-body\"><p>本月全校模考结束，数据分析师小李手上有200名学员的成绩Excel——包含总分、四科分数、各题得分。教研组长要求2小时内出学情分析报告。小李把Excel拖给阿七。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">请分析以下模考成绩数据：\n[拖入Excel文件：200名学员×总分+四科分数+40题逐题得分]\n\n输出：整体情况、分层画像、薄弱科目排名、高频失分考点TOP10、教学调整建议。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出完整分析报告：①整体：平均分62.3/及格率38%/分数段分布图 ②分层：零基础68人（<60）/中等95人（60-80）/拔高37人（>80），各层四科平均分对比 ③薄弱排名：实务（均分51.2）>技术（均分58.7）>管理（均分65.1）>法规（均分71.8）④失分TOP10：第3题（应急救援78%错）、第7题（预案备案65%错）、第15题（危险源辨识62%错）等 ⑤教学调整建议5条：实务案例题专项训练/技术科目计算题加强/管理科目'应急'章节补漏等。</div></div></div><p><strong>🔁 迭代追问：</strong>教研组长看了报告后要求进一步做错题根因分析和个性化补弱方案：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">报告很全面。请进一步：①对失分TOP10逐题做根因分析（法条混淆/计算失误/案例逻辑差/审题失误）②为中等层（60-80分）学员生成群体补弱方案 ③为3名重点学员（张三/李四/王五）生成个性化补弱方案</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">①逐题根因分析：第3题=案例逻辑差（不会拆解应急响应流程）/第7题=法条混淆（备案层级记混）/第15题=概念混淆（危险源vs重大危险源）...根因汇总：法条混淆占35%/案例逻辑差占28%/计算失误占20%/审题失误占17%。②中等层群体补弱：4周计划（第1周法条对比专项/第2周案例拆解训练/第3周计算题强化/第4周综合模考），每周末2小时直播补弱课。③3名重点学员画像+个性化方案（张三：实务案例弱→案例专项2周+每日1题；李四：技术计算弱→计算公式手册+每日3题；王五：法规法条混→法条对比表+碎片速记卡）。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份完整学情分析报告（含数据图表）+1份错题根因分析报告+1份中等层群体补弱方案+3份个性化补弱方案。教研组长据此调整下月教学计划，班主任据此管理分层学员。全程40分钟（含迭代），传统方式需2-3天。报告同步写入飞书知识库供团队查阅。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">错题数据→变式训练（场景2：题库命题）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">补弱方案→补漏微课（场景4：答疑标准化）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">教学调整→课程设计（场景3：课程磨课）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">模考成绩→教研复盘（场景10：教研复盘）</div></div></div>"}, {"id": "s7", "icon": "📋", "title": "考纲政策研读", "sub": "联网搜索→新旧对比→考点增减标注→资料影响清单", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">考纲研读是每年教研工作的起点。教研团队第一时间拆解中级注安官方考试大纲、人事考试网通知、教材改版公告，对比新旧考点增减、分值变动、实务出题风向，输出考纲对比分析报告，指导全年资料更新方向。<br><br><strong>参与角色：</strong>学科负责人（研读考纲+判断影响）→ 教研编写老师（对照修订讲义/题库）→ 课程设计师（调整课程体系）→ 教研组长（统筹更新计划）</div><div class=\"def-flow\"><div class=\"step\">官方通知监测</div><div class=\"step\">新旧考纲对比</div><div class=\"step\">变动影响评估</div><div class=\"step\">更新计划制定</div><div class=\"step\">资料修订执行</div><div class=\"step\">版本切换通知</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 官方信息监测靠人工刷网</h6><p>教研老师每天去人事考试网、应急管理部官网刷有没有新通知，费时且容易遗漏，等发现考纲更新时可能已经晚了好几天。</p></div><div class=\"pain-card\"><h6>🔥 新旧对比全靠逐条比对</h6><p>考纲几十页，新旧版本逐条对比找出增删改考点，极其耗眼力且容易遗漏，对比结果的准确性和完整性难以保证。</p></div><div class=\"pain-card\"><h6>🔥 变动影响评估凭经验</h6><p>'新增了某个考点'意味着什么——分值多少、出什么题型、需要新写多少讲义和题目——全凭学科负责人经验判断，缺乏系统评估。</p></div><div class=\"pain-card\"><h6>🔥 资料更新协调混乱</h6><p>考纲变动后讲义要改、题库要更新、课件要重做、旧版资料要停用——多个教研老师同时改不同资料，版本混乱、进度失控。</p></div><div class=\"pain-card\"><h6>🔥 法规标准更新跟进不及时</h6><p>安全生产新法、行业新标准出台后，所有引用该法规的讲义、课件、题目都要修订，但没人能记住'哪些资料引用了哪条法规'，更新遗漏频发。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">🌐</div><div class=\"e-body\"><h6>联网检索实时监测</h6><p>阿七联网搜索人事考试网、应急管理部最新通知，第一时间获取考纲更新/法规修订信息，可设为定时自动化任务每周自动执行。</p><span class=\"e-result\">信息滞后：数天→实时</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📋</div><div class=\"e-body\"><h6>新旧考纲智能对比</h6><p>新旧两版考纲丢给阿七，逐条对比输出增/删/改考点清单，标注每项变动的分值影响和出题风向预判。</p><span class=\"e-result\">考纲对比：1-2天→30分钟</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🎯</div><div class=\"e-body\"><h6>变动影响系统评估</h6><p>阿七根据考纲变动逐项评估影响——哪些章节讲义需修订、哪些题目需更新、哪些课件需重做、新增考点需多少课时——输出完整的影响清单和更新计划。</p><span class=\"e-result\">影响评估：凭经验→系统化</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔄</div><div class=\"e-body\"><h6>法规更新联动修订</h6><p>新法规出台后，阿七检索所有引用该法规的讲义/课件/题目，输出'需修订资料清单'，确保更新无遗漏。</p><span class=\"e-result\">法规更新遗漏率→零</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：新旧考纲对比分析</div><div class=\"pc-body\">请对比以下新旧两版考纲，输出变动分析报告：\n\n旧版考纲：\n[粘贴2025版考纲相关章节]\n\n新版考纲：\n[粘贴2026版考纲相关章节]\n\n输出：\n1. 新增考点清单（考点+预计分值+出题方向预判）\n2. 删除考点清单（考点+影响哪些资料）\n3. 修改考点清单（修改内容+新旧对比+影响范围）\n4. 分值变动汇总（各科分值分布变化）\n5. 对现有资料的影响清单（讲义/题库/课件各需改什么）</div><div class=\"pc-copy\">每年考纲发布后第一时间用</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：法规更新影响检索</div><div class=\"pc-body\">《[法规名称]》已于[日期]修订，新条款如下：\n[粘贴新法条]\n\n请检索以下资料中引用该法规的内容，输出修订清单：\n[粘贴讲义/课件/题目文本]\n\n输出：\n1. 需修订位置（文件名/页码/原内容→新内容）\n2. 新增内容建议（新法条需要补充到哪些位置）\n3. 废止内容标注（哪些引用已失效需删除）\n4. 修订优先级排序</div><div class=\"pc-copy\">新法规出台后资料更新用</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：备考规划资料产出</div><div class=\"pc-body\">请基于2026年最新考纲，生成以下备考规划资料：\n1. 全年学习计划表（按月份：基础阶段/提升阶段/冲刺阶段）\n2. 四科搭配学习方案（推荐科目组合+顺序+时间分配）\n3. 零基础专属路线（6个月计划，每周学习重点）\n4. 二战考生专属路线（3个月计划，聚焦失分点）\n5. 考前百日冲刺规划（100天倒计时日程表）\n\n标注：各阶段配套资料/练习量/模考安排</div><div class=\"pc-copy\">每年新版备考规划一键生成</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 2026版考纲发布后全流程应对</div><div class=\"case-body\"><p>2026版注安考纲发布，学科负责人需要在3天内完成新旧对比、影响评估、更新计划，并通知全教研团队。以往这个过程需要1-2周。学科负责人把新旧考纲发给阿七。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">请对比以下新旧两版考纲，输出变动分析报告：\n旧版：[粘贴2025版考纲，约5000字]\n新版：[粘贴2026版考纲，约5500字]\n\n输出：新增/删除/修改考点清单+分值变动+资料影响清单。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出变动分析报告：①新增考点6个（如'双重预防机制运行要求'预计3-4分/'安全生产标准化建设'预计2-3分），每个标注出题方向 ②删除考点3个（如'煤矿安全监察体制'已不考）③修改考点8个（如'应急预案备案'层级标准更新），每个附新旧对比 ④分值变动：实务科目案例题从4题增加到5题，总时长延长30分钟 ⑤资料影响清单：12章讲义需修订/35道题需更新/8节课件需重做/4份资料需停用。</div></div></div><p><strong>🔁 迭代追问：</strong>学科负责人确认分析准确，要求阿七直接生成更新计划和备考规划：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">分析很准确。请进一步：①生成资料更新计划（按优先级排序，标注负责人/截止日期/工作量）②基于新考纲生成全年备考规划资料（学习计划表+四科搭配方案+零基础路线+二战路线+百日冲刺规划）③生成旧版资料停用通知</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">①更新计划：按优先级分3批次（第1批7天内：新增考点讲义+模考卷更新/第2批15天内：修改考点讲义+课件重做/第3批30天内：题库全面更新+旧版停用），每项标注预计工时和负责人建议。②备考规划：全年学习计划表（基础4个月/提升3个月/冲刺2个月/模考1个月）+四科搭配方案（法规+管理先行/技术+实务后行）+零基础6月路线（每周重点+练习量+模考安排）+二战3月路线（聚焦失分章节）+百日冲刺日程（100天倒计时，含4次模考）。③旧版资料停用通知（列明停用资料清单+替代版本+切换日期+注意事项）。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份考纲变动分析报告+1份资料更新计划（3批次）+1套全年备考规划资料（5份）+1份旧版停用通知。全教研团队据此启动年度资料更新，3天内完成第1批更新（以往需1-2周）。备考规划资料同步发给销售团队供学员咨询使用。全程约1小时。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">考纲变动→讲义修订（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">新增考点→题库命题（场景2：题库命题）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">备考规划→学员学情（场景6：学情分析）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">旧版停用→版本管控（场景9：版本管控）</div></div></div>"}, {"id": "s8", "icon": "🎥", "title": "直播录课支撑", "sub": "讲稿+PPT→随堂题→互动设计→短视频脚本", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">直播录课是教学内容触达学员的核心渠道。教研团队负责录播课、直播课内容筹备——撰写逐字讲稿、制作配套PPT、准备课堂随堂练习题和互动提问题目。直播现场配合盯课、实时纠正讲师知识点口误、弹幕疑难问题后台整理汇总。同时产出短视频/碎片化素材适配学员碎片复习。<br><br><strong>参与角色：</strong>课程设计师（讲稿+PPT+互动设计）→ 直播督导（现场盯课+弹幕整理）→ 剪辑师（录播剪辑+短视频制作）→ 讲师（授课+课后答疑）</div><div class=\"def-flow\"><div class=\"step\">课程内容筹备</div><div class=\"step\">讲稿PPT制作</div><div class=\"step\">随堂题准备</div><div class=\"step\">直播现场盯课</div><div class=\"step\">课后整理</div><div class=\"step\">短视频产出</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 讲稿PPT分别制作效率低</h6><p>讲稿和PPT往往分开做——先写讲稿再做PPT或反过来——两者内容不同步，讲师上课时发现讲稿说的和PPT展示的对不上。</p></div><div class=\"pain-card\"><h6>🔥 随堂题准备仓促</h6><p>每节课需要3-5道随堂练习题匹配当堂知识点，但老师经常到课前才匆忙找题，题目和讲解内容贴合度不够。</p></div><div class=\"pain-card\"><h6>🔥 直播盯课全靠手动记录</h6><p>督导在直播时手动记录讲师口误和弹幕问题，容易漏记，课后整理也费时，反馈给讲师时已经过了好几天。</p></div><div class=\"pain-card\"><h6>🔥 短视频素材制作排不上</h6><p>考点速记小视频、一题一讲短视频是学员碎片复习的重要素材，但教研老师没有时间写脚本，剪辑师也没有素材可用。</p></div><div class=\"pain-card\"><h6>🔥 课后复盘缺乏数据</h6><p>直播结束后缺少系统化的课后复盘——哪些知识点学员弹幕提问最多、哪段流失率高——全凭感觉，无法数据化优化课程。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">📝</div><div class=\"e-body\"><h6>讲稿+PPT+随堂题一体化产出</h6><p>给阿七章节讲义和课型要求，一次性输出逐字讲稿（含互动节点标注）+ PPT逐页内容 + 3-5道随堂练习题（匹配当堂知识点），三者内容完全同步。</p><span class=\"e-result\">备课准备：1天→2小时</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🎯</div><div class=\"e-body\"><h6>互动问题设计</h6><p>阿七根据知识点设计互动问题（投票/提问/讨论），标注插入时机、预计时长、预期回答方向，提升直播互动效果。</p><span class=\"e-result\">互动设计从随意→系统化</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📱</div><div class=\"e-body\"><h6>短视频脚本批量生成</h6><p>阿七根据考点清单批量生成60秒短视频脚本（考点速记/一题一讲/法条对比），剪辑师拿到脚本直接制作。</p><span class=\"e-result\">短视频产出：1条/天→5条/天</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔧</div><div class=\"e-body\"><h6>连接器直发平台</h6><p>阿七把讲稿/PPT/随堂题直接写入飞书文档或腾讯文档，讲师和督导无需下载传文件，在线协同。</p><span class=\"e-result\">文件协同：反复传→直发平台</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：直播课完整筹备包</div><div class=\"pc-body\">你是一位注安课程设计师。\n请为以下章节直播课生成完整筹备包：\n[粘贴章节讲义]\n\n课型：直播精讲课，时长：120分钟\n\n输出：\n1. 逐字讲稿（标注[互动提问][投票][随堂练习][播放案例]等节点）\n2. PPT逐页内容（20-25页）\n3. 随堂练习题3道（匹配当堂核心知识点，含答案解析）\n4. 互动设计（2-3个互动环节，标注类型/时机/预期效果）\n5. 课后作业（5题，标注对应考点）</div><div class=\"pc-copy\">直播课一揽子备课</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：短视频脚本批量生成</div><div class=\"pc-body\">请基于以下考点清单，批量生成60秒短视频脚本：\n[粘贴考点清单：10个考点]\n\n每个考点输出：\n1. 视频标题（吸引眼球，含关键词）\n2. 开场白（5秒，抓住注意力）\n3. 核心内容（45秒，考点精讲+口诀）\n4. 结尾引导（10秒，引导关注/刷题）\n5. 画面建议（配图/文字/动画提示）\n6. 字幕文案</div><div class=\"pc-copy\">碎片化复习素材批量产出</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：直播课后复盘</div><div class=\"pc-body\">以下是本次直播课的课后数据：\n- 最高在线：[X]人\n- 平均观看时长：[X]分钟\n- 弹幕问题汇总：[粘贴问题列表]\n- 讲师口误记录：[粘贴记录]\n\n请生成课后复盘报告：\n1. 互动数据分析（弹幕高峰时段→对应讲解内容）\n2. 高频问题分类（知识点疑问/备考策略/其他）\n3. 讲师口误纠错清单（原话→正确表述）\n4. 课程优化建议（3-5条）\n5. 下次直播改进要点</div><div class=\"pc-copy\">直播后标准化复盘</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 直播精讲课完整筹备+短视频批量产出</div><div class=\"case-body\"><p>教研团队下周要开一节120分钟的'机械安全防护'直播精讲课，同时需要配套产出5条考点速记短视频。课程设计师小陈打开阿七，把讲义发给阿七。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">请为'机械安全防护'章节直播课生成完整筹备包：\n[粘贴讲义约3000字]\n课型：直播精讲，时长120分钟。输出：讲稿+PPT+随堂题+互动设计+课后作业。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出完整筹备包：①逐字讲稿约12000字，标注了6处[互动提问]、3处[投票]、3处[随堂练习]、2处[播放案例] ②PPT 24页（封面→学习目标→考情→4个知识模块→每模块含知识点+图示+互动→小结→作业）③随堂题3道（防护装置分类/安全距离计算/联锁装置原理，含答案解析）④互动设计3环节（开场投票'你见过哪些机械伤害'/中场提问'防护装置选型'/结束投票'最难知识点'）⑤课后作业5题。</div></div></div><p><strong>🔁 迭代追问：</strong>筹备包定稿后，小陈继续生成短视频脚本和课后复盘模板：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">筹备包很好。请继续：①基于本章5个核心考点生成5条60秒短视频脚本 ②把讲稿和PPT写入飞书文档方便讲师在线查看 ③生成直播课后复盘模板</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">①5条短视频脚本：每条含标题/开场白/核心内容（含口诀）/结尾引导/画面建议/字幕文案。如'3秒记住机械防护三原则：固定→联锁→控制，缺一不可'。②已将讲稿和PPT内容写入飞书文档（链接已生成），讲师可在线查看编辑。③课后复盘模板：含互动数据分析框架/高频问题分类表/口误纠错清单格式/优化建议模板/下次改进要点清单。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份12000字讲稿+24页PPT+3道随堂题+互动设计+5道课后作业+5条短视频脚本+飞书文档（已写入）+复盘模板。讲师拿到后直接用于直播，短视频脚本交给剪辑师同步制作。直播课后用复盘模板做标准化复盘，优化下节课。全程约2小时，传统方式需2-3天。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">讲稿内容→讲义研发（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">随堂题→题库命题（场景2：题库命题）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">高频问题→答疑知识库（场景4：答疑标准化）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">课后作业→学情分析（场景6：学情分析）</div></div></div>"}, {"id": "s9", "icon": "🗂️", "title": "资料版本管控与质量质检", "sub": "格式校对→法条核对→旧版停用→分发管理", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">资料版本管控是教研内容质量的最后防线。所有讲义、课件、试卷、解析执行多层校对，核对法条编号、规范标准、计算公式、实务判分点，杜绝知识性错误。区分旧版考纲资料和新版备考资料，通知师生停用过时教辅，防止学员学错旧规范。统筹纸质/电子资料的排版、校对、打包分发。<br><br><strong>参与角色：</strong>质检审核员（内容校对+法条核对）→ 版本管理员（版本标记+停用通知）→ 排版老师（格式统一+打印准备）→ 教研组长（质检报告审阅+问题追踪）</div><div class=\"def-flow\"><div class=\"step\">内容校对</div><div class=\"step\">法条编号核对</div><div class=\"step\">格式排版统一</div><div class=\"step\">版本标记归档</div><div class=\"step\">旧版停用通知</div><div class=\"step\">分发打包</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 多层校对全靠人工眼力</h6><p>讲义动辄数百页，法条编号、规范标准号、计算公式需要逐条核对，人工校对容易疲劳遗漏，一个错误漏过去就可能让学员考试丢分。</p></div><div class=\"pain-card\"><h6>🔥 旧版资料清理不及时</h6><p>每年考纲变动后旧版讲义、题库、课件需要停用，但资料散落在飞书、网盘、个人电脑各处，没人能确认'哪些是旧版、哪些已更新'，学员拿到旧版资料学错规范。</p></div><div class=\"pain-card\"><h6>🔥 格式不统一影响专业感</h6><p>不同老师制作的讲义/课件格式各异——字体大小不一、编号格式混乱、表格样式不统一——影响教研资料的专业形象和学员使用体验。</p></div><div class=\"pain-card\"><h6>🔥 分发流程繁琐</h6><p>资料定稿后需要分阶段发放（预习资料/冲刺资料/模考卷），纸质版要排版打印、电子版要网盘打包，流程繁琐且容易发错版本。</p></div><div class=\"pain-card\"><h6>🔥 质检问题无追踪</h6><p>校对发现的问题（法条错误/格式问题/内容遗漏）记录在各自的文档里，没有统一的问题追踪台账，同样的问题在不同资料中反复出现。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">🔍</div><div class=\"e-body\"><h6>法条编号自动核对</h6><p>阿七逐条核对讲义/题目中的法条编号、规范标准号、计算公式是否准确，输出核对清单（✅正确/❌错误+正确版本），第一轮机审替代人工。</p><span class=\"e-result\">法条核对：数小时→10分钟</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📋</div><div class=\"e-body\"><h6>考纲新旧对比→旧版停用清单</h6><p>阿七对比新旧考纲，自动生成'需停用资料清单'和'需更新资料清单'，确保旧版资料不遗漏、新版资料及时替换。</p><span class=\"e-result\">版本管理：从混乱→系统化</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🎨</div><div class=\"e-body\"><h6>格式规范统一检查</h6><p>阿七检查讲义/课件的格式规范性（字体/编号/表格/标题层级），输出格式问题清单，确保所有教研资料风格统一。</p><span class=\"e-result\">格式统一：从各做各的→标准化</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📦</div><div class=\"e-body\"><h6>分发计划自动生成</h6><p>阿七根据备考阶段生成资料分发计划（预习阶段发什么/冲刺阶段发什么/模考前发什么），标注分发时间和分发渠道。</p><span class=\"e-result\">分发管理：从手动→计划化</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：内容质检全量核对</div><div class=\"pc-body\">请对以下讲义进行全量质检核对：\n[粘贴讲义全文]\n\n检查项：\n1. 法条编号准确性（逐条核对，标注✅/❌）\n2. 规范标准号准确性（如GB/T XXXX-XXXX）\n3. 计算公式正确性\n4. 实务判分点完整性\n5. 内容与最新考纲一致性\n6. 前后文逻辑一致性\n\n输出：问题清单（位置/问题描述/正确内容/严重程度）+ 修改建议</div><div class=\"pc-copy\">三级审核第一轮机审</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：旧版资料停用清单</div><div class=\"pc-body\">2026版考纲已发布，以下变动已确认：\n[粘贴考纲变动清单]\n\n请检索以下资料清单，输出：\n1. 需停用资料（引用已废止法条/已删除考点的资料）\n2. 需更新资料（需修订但不需要停用的资料）\n3. 可继续使用资料（不受考纲变动影响）\n4. 旧版停用通知（含停用清单+替代版本+切换日期）</div><div class=\"pc-copy\">每年考纲变动后版本清理</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：格式规范检查</div><div class=\"pc-body\">请检查以下讲义的格式规范性：\n[粘贴讲义内容]\n\n检查项：\n1. 标题层级是否规范（一级/二级/三级标题格式）\n2. 法条引用格式是否统一（如《安全生产法》第X条）\n3. 编号序列是否连续正确\n4. 表格格式是否统一\n5. 重点标注方式是否一致\n\n输出：格式问题清单+修改建议+规范格式示例</div><div class=\"pc-copy\">排版老师格式校对用</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 新版讲义全量质检+旧版停用一条龙</div><div class=\"case-body\"><p>2026版法规科目讲义修订完成（约200页），质检审核员需要全量核对法条编号和内容准确性，同时需要清理旧版资料。审核员把讲义全文发给阿七。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">请对以下讲义进行全量质检核对：\n[粘贴讲义全文约80000字]\n\n检查：法条编号/规范标准号/计算公式/考纲一致性/前后文逻辑。输出问题清单。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出质检报告：①法条编号：核对186处引用，发现3处错误（第45页《安全生产法》第38条应为第39条/第78页引用已废止的《煤矿安全监察条例》/第102页GB6442-1986应为GB/T6441-1986）②规范标准号：核对42处，全部正确 ③计算公式：核对15处，全部正确 ④考纲一致性：发现2处保留了2025版已删除的考点 ⑤前后文逻辑：1处前后表述不一致（第30页说'三级教育'第85页说'四级教育'）。共6个问题，3个严重（❌）、3个中等（⚠️）。</div></div></div><p><strong>🔁 迭代追问：</strong>审核员确认问题准确，继续生成旧版停用清单和分发计划：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">质检报告很准确。请继续：①基于考纲变动生成旧版资料停用清单（旧版讲义/题库/课件/试卷各哪些需停用）②生成2026版资料分发计划（预习/基础/冲刺/模考各阶段发什么）③生成格式规范检查报告</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">①旧版停用清单：讲义12份（列出文件名+停用原因+替代版本）、题库8套（含已废止法条的题目集）、课件6份、试卷4套。停用通知含切换日期（2026年7月1日）和注意事项。②分发计划：预习阶段（7月：考纲解读+学习计划表+预习讲义3章）/基础阶段（8-10月：全科讲义+基础题库+周练习）/冲刺阶段（11月：冲刺讲义+高频考点手册+速记卡片）/模考阶段（10-12月：4套模考卷+错题专项+考前押题）。③格式检查：发现5类格式问题（标题层级不一致/法条引用格式混用/编号序列断号/表格样式不统一/重点标注方式不统一），附修改建议和规范格式示例。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份质检报告（6个问题含修改建议）+1份旧版停用清单+1份资料分发计划+1份格式规范检查报告。教研编写老师根据质检报告修改3处严重错误，版本管理员发布停用通知，排版老师按格式规范统一所有资料。全程约1小时，传统方式需3-5天。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">质检报告→讲义修订（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">旧版停用→考纲研读（场景7：考纲研读）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">分发计划→直播录课（场景8：直播录课）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">格式规范→师资培训（场景5：师资培训）</div></div></div>"}, {"id": "s10", "icon": "🔄", "title": "行业信息与教研复盘", "sub": "定时抓取简报→季度年度复盘→跨科协同文档", "html": "<div class=\"ss-label\"><span class=\"ss-num\">1</span> 场景定义</div><div class=\"def-box\">教研复盘是驱动教研体系持续进化的闭环机制。教研团队关注其他头部机构教研方向、历年阅卷得分情况、考生真实考场反馈、阅卷扣分细则。按季度/年度汇总学员通过率、模考平均分、资料使用反馈，梳理整套讲义、题库、课程的短板。注安法规、管理、技术、实务存在交叉考点，组织四科教研互通，统一交叉知识点讲解标准。<br><br><strong>参与角色：</strong>教研组长（统筹复盘+短板梳理）→ 学科负责人（各科数据分析+改进建议）→ 教研编写老师（资料修订执行）→ 教研组长（跨科协同组织）</div><div class=\"def-flow\"><div class=\"step\">行业信息收集</div><div class=\"step\">数据分析汇总</div><div class=\"step\">短板梳理</div><div class=\"step\">改进计划制定</div><div class=\"step\">跨科协同</div><div class=\"step\">迭代执行</div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--danger)\">2</span> 核心痛点</div><div class=\"pain-grid\"><div class=\"pain-card\"><h6>🔥 行业信息收集靠零散刷网</h6><p>教研老师偶尔看到行业新闻就转发到群里，没有系统化的信息收集机制，对其他机构的教研动态、阅卷规则变化缺乏持续跟踪。</p></div><div class=\"pain-card\"><h6>🔥 复盘报告写起来费时</h6><p>季度/年度复盘需要汇总通过率、模考数据、资料反馈、教学问题等多维度数据，写一份复盘报告需要3-5天，等写完时改进窗口已过。</p></div><div class=\"pain-card\"><h6>🔥 短板梳理缺乏数据支撑</h6><p>'讲义哪里不好'全凭老师主观感受，没有数据支撑——学员使用时长、练习正确率、反馈评分——导致改进方向不精准。</p></div><div class=\"pain-card\"><h6>🔥 跨科协同靠开会效率低</h6><p>四科交叉考点需要统一讲解标准，但组织四科老师开会协调时间困难，会上讨论后也难以形成标准化文档。</p></div><div class=\"pain-card\"><h6>🔥 改进措施执行无追踪</h6><p>复盘后发现的问题和改进措施没有系统追踪——'讲义第3章需重写''题库需增加案例题'——定了但没人跟进，下次复盘同样的问题依然存在。</p></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--accent)\">3</span> WorkBuddy 赋能方案</div><div class=\"empower-list\"><div class=\"empower-item\"><div class=\"e-icon\">🌐</div><div class=\"e-body\"><h6>行业信息定时抓取</h6><p>阿七设为定时自动化任务，每周自动搜索行业动态（考纲变化/法规更新/其他机构教研方向/阅卷规则），生成行业简报推送到飞书群。</p><span class=\"e-result\">信息收集：零散→系统化</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📊</div><div class=\"e-body\"><h6>复盘报告数据驱动</h6><p>把通过率、模考数据、资料反馈数据发给阿七，自动生成结构化复盘报告（数据汇总+短板分析+改进建议+优先级排序）。</p><span class=\"e-result\">复盘报告：3-5天→2小时</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">🔗</div><div class=\"e-body\"><h6>跨科协同文档自动生成</h6><p>阿七分析四科考纲找出交叉考点，自动生成跨科协同文档（交叉考点清单+各科考查角度+统一讲解标准建议），减少协调会议。</p><span class=\"e-result\">跨科协同：开会→文档驱动</span></div></div><div class=\"empower-item\"><div class=\"e-icon\">📋</div><div class=\"e-body\"><h6>改进措施追踪台账</h6><p>阿七把复盘发现的问题和改进措施建立追踪台账（问题/负责人/截止日期/完成状态），定期自动提醒跟进。</p><span class=\"e-result\">改进执行：从无追踪→闭环管理</span></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--warm)\">4</span> 推荐提示词模板</div><div class=\"prompt-list\"><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板一：季度教研复盘报告</div><div class=\"pc-body\">请基于以下数据生成本季度教研复盘报告：\n\n数据：\n1. 学员通过率：[本期数据] vs [上期数据]\n2. 模考平均分趋势：[各月数据]\n3. 资料使用反馈：[学员评分/使用时长]\n4. 错题高频考点TOP10：[数据]\n5. 答疑高频问题TOP10：[数据]\n6. 讲师考核结果：[数据]\n\n输出：\n1. 整体数据概览（含同比环比）\n2. 亮点（3-5条）\n3. 短板（3-5条，附数据支撑）\n4. 根因分析\n5. 下季度改进计划（按优先级，附负责人/截止日期）\n6. 改进措施追踪台账</div><div class=\"pc-copy\">每季度末标准复盘流程</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板二：行业信息简报</div><div class=\"pc-body\">请搜索以下信息并生成行业简报：\n1. 中级注安考试最新政策/通知\n2. 安全生产最新法规/标准\n3. 其他头部机构教研动态（新课程/新资料/新玩法）\n4. 考生考场反馈/阅卷规则变化\n5. 行业热点事件\n\n输出：分类简报（每条含来源/摘要/对教研的影响/建议行动）</div><div class=\"pc-copy\">可设为定时任务每周自动执行</div></div><div class=\"prompt-card\"><div class=\"pc-head\">📋 模板三：跨科协同文档</div><div class=\"pc-body\">请分析注安四科考纲，找出交叉考点并生成协同文档：\n[粘贴四科考纲目录]\n\n输出：\n1. 交叉考点清单（考点/涉及科目/各科考查角度/分值占比）\n2. 各科讲解口径差异分析\n3. 统一讲解标准建议\n4. 跨科教学衔接建议（什么阶段提醒学员回顾其他科目）\n5. 交叉考点专项练习建议</div><div class=\"pc-copy\">四科教研协同专用</div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--info)\">5</span> 完整案例演示</div><div class=\"case-box\"><div class=\"case-head\">📖 季度教研复盘+行业简报+跨科协同一条龙</div><div class=\"case-body\"><p>季度末，教研组长需要完成三件事：①季度教研复盘报告 ②行业信息简报 ③四科交叉考点协同文档。以往这三件事加起来需要一周。教研组长把数据发给阿七。</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师输入</div><div class=\"ct-bubble u\">请基于以下数据生成本季度教研复盘报告：\n1.通过率：本期32% vs 上期28%\n2.模考平均分趋势：9月58→10月62→11月65→12月68\n3.资料评分：讲义4.2/题库4.0/课件3.8（满分5）\n4.错题TOP10：[数据]\n5.答疑高频TOP10：[数据]\n6.讲师考核：8人合格/2人需改进\n\n输出：数据概览+亮点+短板+根因+改进计划+追踪台账。</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七输出</div><div class=\"ct-bubble a\">输出复盘报告：①整体：通过率+4%/模考均分+10/资料评分中课件最低 ②亮点：通过率提升显著/实务案例题得分率提升15%/新讲师通关率100% ③短板：课件评分3.8偏低/技术科目计算题得分率仅45%/法规科目'行政处罚'章节反复出错 ④根因：课件互动设计不足/计算题专项训练不够/法条对比表未更新 ⑤改进计划5条（课件互动改造/计算题专项包/法条对比表更新/...按优先级排序，附负责人和截止日期）⑥追踪台账（5条措施，状态/进度/下次检查日期）。</div></div></div><p><strong>🔁 迭代追问：</strong>复盘报告完成后，教研组长继续生成行业简报和跨科协同文档：</p><div class=\"case-dialog\"><div class=\"case-turn\"><div class=\"ct-role u\">👤 教研老师</div><div class=\"ct-bubble u\">复盘报告很好。请继续：①搜索最新行业信息生成简报 ②分析四科考纲交叉考点生成协同文档 ③把复盘报告写入飞书知识库</div></div><div class=\"case-turn\"><div class=\"ct-role a\">🤖 阿七</div><div class=\"ct-bubble a\">①行业简报：搜索到3条政策更新（应急管理部新规2条/考务通知1条）、2条法规修订、3条其他机构动态（某机构推出AI刷题/某机构上线案例专项课）、考生反馈5条（机考操作注意事项/实务答题时间不够）。每条附影响分析和建议行动。②跨科协同文档：识别12个交叉考点（如'危险源辨识'管理+技术+实务都考），每个标注各科考查角度差异+统一讲解标准建议+教学衔接时机。③复盘报告已写入飞书知识库（链接已生成），团队可在线查阅。</div></div></div><div class=\"case-result\"><h6>✅ 最终产出</h6><p>最终产出：1份季度教研复盘报告（含改进计划+追踪台账）+1份行业信息简报+1份四科跨科协同文档+飞书知识库已同步。教研组长据此启动下季度改进，行业简报设为每周定时自动生成。全程约2小时，传统方式需1周。跨科协同文档减少了80%的协调会议。</p></div></div></div><div class=\"ss-label\" style=\"margin-top:28px\"><span class=\"ss-num\" style=\"background:var(--success)\">6</span> 延伸联动</div><div class=\"link-box\"><h6>🔗 本场景产出与以下场景联动，形成教研闭环：</h6><div class=\"link-flow\"><div class=\"lf-item\">复盘数据→学情分析（场景6：学情分析）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">改进措施→讲义修订（场景1：讲义研发）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">行业简报→考纲研读（场景7：考纲研读）</div><span style=\"color:var(--success);font-weight:800\">→</span><div class=\"lf-item\">跨科协同→课程设计（场景3：课程磨课）</div></div></div>"}];
var navLabels = ["教材讲义", "题库命题", "课程设计", "答疑标准", "师资培训", "学情分析", "考纲政策", "直播录课", "资料版本", "行业信息"];

(function(){
var h='', navH='';
SCENES.forEach(function(s, i){
var num = (i+1 < 10 ? '0' : '') + (i+1);
h += '<div class="scene-item reveal" id="'+s.id+'">' +
'<div class="scene-head" onclick="this.parentElement.classList.toggle('open')">' +
'<div class="s-icon">'+s.icon+'</div>' +
'<div class="s-info"><h3>'+s.title+'</h3><p>'+s.sub+'</p></div>' +
'<div class="s-num">'+num+'</div>' +
'<div class="s-chev">▾</div></div>' +
'<div class="scene-body"><div class="scene-body-inner">'+s.html+'</div></div></div>';
navH += '<a class="nav-link" href="#'+s.id+'">'+navLabels[i]+'</a>';
});
document.getElementById('sceneList').innerHTML = h;
var brand = document.querySelector('.nav-brand');
brand.insertAdjacentHTML('afterend', navH);

// Scroll nav style
var nav = document.getElementById('nav');
window.addEventListener('scroll', function(){
nav.classList.toggle('scrolled', window.scrollY > 60);
});

// Reveal animation
var obs = new IntersectionObserver(function(entries){
entries.forEach(function(e){
if(e.isIntersecting){e.target.classList.add('visible'); obs.unobserve(e.target);}
});
}, {threshold: 0.08});
document.querySelectorAll('.reveal').forEach(function(el){ obs.observe(el); });

// Nav active highlight
var links = document.querySelectorAll('.nav-link');
window.addEventListener('scroll', function(){
var sy = window.scrollY + 80;
links.forEach(function(l){ l.classList.remove('active'); });
for(var i = links.length - 1; i >= 0; i--){
var sec = document.getElementById('s' + (i+1));
if(sec && sec.offsetTop <= sy){ links[i].classList.add('active'); break; }
}
if(window.scrollY < 200) links[0].classList.add('active');
});

// Open first scene by default
document.querySelector('.scene-item').classList.add('open', 'visible');
})();
</script>
