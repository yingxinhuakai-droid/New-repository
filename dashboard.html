<title>WorkBuddy · 项目成果总览</title>
<style>
  :root {
    --bg: #f5f6fa;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --blue: #3b82f6;
    --blue-light: #eff6ff;
    --purple: #8b5cf6;
    --purple-light: #f5f3ff;
    --green: #10b981;
    --green-light: #ecfdf5;
    --amber: #f59e0b;
    --amber-light: #fffbeb;
    --rose: #f43f5e;
    --rose-light: #fff1f2;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --radius: 16px;
    --radius-sm: 10px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    padding: 48px 0 40px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30%; left: -10%;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    position: relative;
    z-index: 1;
  }
  .header .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 20px;
  }
  .header .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #10b981;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }
  .header h1 {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .header .subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
  }
  .header .org-tag {
    display: inline-block;
    margin-top: 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    padding: 4px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
  }

  /* ── Stats Row ── */
  .stats-row {
    max-width: 1280px;
    margin: -24px auto 0;
    padding: 0 32px;
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
    transition: var(--transition);
  }
  .stat-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }
  .stat-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .stat-icon.blue { background: var(--blue-light); color: var(--blue); }
  .stat-icon.purple { background: var(--purple-light); color: var(--purple); }
  .stat-icon.green { background: var(--green-light); color: var(--green); }
  .stat-icon.amber { background: var(--amber-light); color: var(--amber); }
  .stat-info .stat-num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .stat-info .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ── Main Content ── */
  .main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 32px 60px;
  }

  /* ── Filters ── */
  .filters {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .filters-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .filter-chip {
    padding: 8px 18px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
    color: var(--text-secondary);
    font-weight: 500;
    user-select: none;
  }
  .filter-chip:hover { border-color: #cbd5e1; background: #f8fafc; }
  .filter-chip.active {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
    box-shadow: 0 4px 12px rgba(59,130,246,0.3);
  }
  .search-box {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    transition: var(--transition);
  }
  .search-box:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .search-box input {
    border: none; outline: none;
    background: transparent;
    font-size: 13px;
    color: var(--text);
    width: 180px;
    font-family: inherit;
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-icon { color: var(--text-muted); font-size: 14px; }

  /* ── Project Grid ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }
  .project-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    transition: var(--transition);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    opacity: 0;
    transition: var(--transition);
  }
  .project-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-3px);
    border-color: transparent;
  }
  .project-card:hover::before { opacity: 1; }
  .project-card.cat-analysis::before { background: var(--blue); }
  .project-card.cat-design::before { background: var(--purple); }
  .project-card.cat-training::before { background: var(--amber); }
  .project-card.cat-tool::before { background: var(--green); }

  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 50px;
    margin-bottom: 14px;
    width: fit-content;
    letter-spacing: 0.01em;
  }
  .badge-analysis { background: var(--blue-light); color: var(--blue); }
  .badge-design { background: var(--purple-light); color: var(--purple); }
  .badge-training { background: var(--amber-light); color: #b45309; }
  .badge-tool { background: var(--green-light); color: #059669; }

  .card-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .card-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
    line-height: 1.4;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    flex: 1;
  }
  .card-meta {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .card-meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .card-meta-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .card-arrow {
    position: absolute;
    top: 28px; right: 28px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    opacity: 0.5;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .project-card:hover .card-arrow { opacity: 1; background: #e2e8f0; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    grid-column: 1 / -1;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state .empty-text { font-size: 16px; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 36px 0 32px; }
    .header-inner { padding: 0 20px; }
    .header h1 { font-size: 26px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); padding: 0 20px; margin-top: -20px; }
    .main { padding: 28px 20px 40px; }
    .projects-grid { grid-template-columns: 1fr; }
    .filters { gap: 8px; }
    .search-box { margin-left: 0; width: 100%; }
    .search-box input { width: 100%; }
  }
</style>
</head>

// ── Type config ──
const typeConfig = {
  html: { icon: '🌐', label: 'HTML', dot: 'var(--blue)' },
  md: { icon: '📝', label: 'Markdown', dot: 'var(--purple)' },
  xlsx: { icon: '📊', label: 'Excel', dot: 'var(--green)' },

};

// ── Render ──
function renderCards(items) {
  const grid = document.getElementById('projectsGrid');
  const empty = document.getElementById('emptyState');

  if (items.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map(p => {
    const tc = typeConfig[p.type] || {};
    return `
      <div class="project-card cat-${p.catClass}" onclick="window.open('${p.file}', '_blank')" title="点击打开">
        <span class="card-badge ${p.badgeClass}">${p.catLabel}</span>
        <span class="card-arrow">↗</span>
        <div class="card-date">${p.date}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-meta">
          <div class="card-meta-item">
            <span>${tc.icon || '📁'}</span>
            <span>${tc.label || p.type.toUpperCase()}</span>
          </div>
          ${p.highlights.map(h => `
            <div class="card-meta-item">
              <span class="dot" style="background:${tc.dot || '#94a3b8'}"></span>
              <span>${h}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ── Filters ──
let activeFilter = 'all';

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', applyFilters);

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = projects;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(p => p.category === activeFilter);
  }

  if (query) {
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(query) ||
      p.desc.toLowerCase().includes(query) ||
      p.catLabel.toLowerCase().includes(query) ||
      p.highlights.some(h => h.toLowerCase().includes(query))
    );
  }

  renderCards(filtered);
}

// ── Init ──
renderCards(projects);
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN');
</script>
