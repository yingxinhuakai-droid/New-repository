<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环球网校 · 运营工具箱</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --sidebar: 240px;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
  --red: #dc2626;
  --green: #16a34a;
  --purple: #7c3aed;
  --orange: #ea580c;
  --teal: #0d9488;
  --pink: #db2777;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background:#fff; color:var(--gray-900); line-height:1.6; }

.layout { display:flex; min-height:100vh; }
.sidebar { width:var(--sidebar); background:var(--gray-50); border-right:1px solid var(--gray-200); position:fixed; top:0; left:0; height:100vh; display:flex; flex-direction:column; z-index:100; transition:transform .25s; }
.sidebar-header { padding:24px 20px 20px; border-bottom:1px solid var(--gray-200); }
.sidebar-header h1 { font-size:15px; font-weight:700; color:var(--gray-900); letter-spacing:-.02em; }
.sidebar-header p { font-size:11px; color:var(--gray-500); margin-top:4px; }
.sidebar-nav { flex:1; overflow-y:auto; padding:12px 0; }
.sidebar-nav a { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; font-size:13px; color:var(--gray-700); text-decoration:none; transition:all .15s; border-left:3px solid transparent; }
.sidebar-nav a:hover { background:var(--blue-light); color:var(--blue); }
.sidebar-nav a.active { background:var(--blue-light); color:var(--blue); border-left-color:var(--blue); font-weight:600; }
.sidebar-nav a .count { font-size:11px; color:var(--gray-500); background:var(--gray-200); padding:1px 8px; border-radius:10px; min-width:22px; text-align:center; }
.sidebar-nav a.active .count { background:var(--blue); color:#fff; }
.sidebar-nav a.empty { color:var(--gray-500); cursor:default; }
.sidebar-nav a.empty:hover { background:transparent; color:var(--gray-500); }
.sidebar-nav a.empty .count { opacity:.5; }

.main { margin-left:var(--sidebar); flex:1; min-width:0; }
.topbar { position:sticky; top:0; background:#fff; z-index:50; padding:20px 32px 16px; border-bottom:1px solid var(--gray-100); }
.search-wrap { position:relative; max-width:560px; }
.search-wrap input { width:100%; padding:10px 14px 10px 38px; border:1px solid var(--gray-300); border-radius:8px; font-size:14px; outline:none; transition:border .15s, box-shadow .15s; }
.search-wrap input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.search-wrap input::placeholder { color:var(--gray-500); }
.search-wrap .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--gray-500); font-size:16px; }
.search-wrap .clear-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--gray-500); cursor:pointer; font-size:16px; display:none; padding:2px 4px; border-radius:4px; }
.search-wrap .clear-btn:hover { background:var(--gray-200); }
.search-wrap .clear-btn.visible { display:block; }

.content { padding:0 32px 48px; }
.category-section { margin-top:32px; }
.category-section:first-child { margin-top:24px; }
.category-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.category-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.category-header h2 { font-size:16px; font-weight:600; color:var(--gray-900); }
.category-header .count-badge { font-size:12px; color:var(--gray-500); }
.cards { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
.card { display:block; padding:18px 20px; background:#fff; border:1px solid var(--gray-200); border-radius:8px; text-decoration:none; color:inherit; transition:box-shadow .15s, transform .15s, border-color .15s; }
.card:hover { box-shadow:0 4px 16px rgba(0,0,0,.06); transform:translateY(-1px); border-color:var(--gray-300); }
.card-title { font-size:14px; font-weight:600; color:var(--gray-900); margin-bottom:6px; }
.card-desc { font-size:12px; color:var(--gray-500); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-tags { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.card-tag { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--gray-100); color:var(--gray-500); }
.card-external { display:inline-block; margin-top:8px; font-size:11px; color:var(--blue); background:var(--blue-light); padding:2px 8px; border-radius:4px; }

.empty-state { text-align:center; padding:60px 20px; color:var(--gray-500); }
.empty-state .icon { font-size:32px; margin-bottom:12px; opacity:.5; }
.empty-state p { font-size:13px; }

.placeholder-cards { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; margin-top:4px; }
.placeholder-card { padding:18px 20px; border:1px dashed var(--gray-300); border-radius:8px; text-align:center; }
.placeholder-card .dot { font-size:20px; color:var(--gray-300); margin-bottom:8px; }
.placeholder-card .txt { font-size:12px; color:var(--gray-500); }

.no-results { display:none; text-align:center; padding:48px 20px; color:var(--gray-500); }
.no-results.visible { display:block; }
.no-results .icon { font-size:32px; margin-bottom:12px; opacity:.4; }
.no-results p { font-size:13px; }

.mobile-toggle { display:none; position:fixed; top:12px; left:12px; z-index:200; width:36px; height:36px; background:#fff; border:1px solid var(--gray-200); border-radius:8px; cursor:pointer; padding:0; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.mobile-toggle span { display:block; width:16px; height:2px; background:var(--gray-700); border-radius:1px; position:relative; transition:all .2s; }
.mobile-toggle span::before, .mobile-toggle span::after { content:''; display:block; width:16px; height:2px; background:var(--gray-700); border-radius:1px; position:absolute; left:0; transition:all .2s; }
.mobile-toggle span::before { top:-5px; }
.mobile-toggle span::after { bottom:-5px; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:99; }

@media (max-width:1024px) {
  .cards { grid-template-columns:repeat(2, 1fr); }
  .placeholder-cards { grid-template-columns:repeat(2, 1fr); }
}
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; }
  .topbar { padding:16px 16px 12px; }
  .content { padding:0 16px 32px; }
  .cards { grid-template-columns:1fr; }
  .placeholder-cards { grid-template-columns:1fr; }
  .mobile-toggle { display:flex; }
  .overlay.visible { display:block; }
  .topbar { padding-top:56px; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="mobile-toggle" id="menuToggle" onclick="toggleSidebar()"><span></span></button>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>运营工具箱</h1>
      <p>环球网校 · hqza.work</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="search-wrap">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="searchInput" placeholder="搜索工具名称、描述或标签..." oninput="handleSearch()">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">&#x2715;</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty-state"><div class="icon">&#x23F3;</div><p>加载中...</p></div>
    </div>
  </main>
</div>

<script>
const CATEGORIES = [
  { id:'运营策略', color:'var(--blue)', dot:'#2563eb' },
  { id:'销售支持', color:'var(--orange)', dot:'#ea580c' },
  { id:'数据分析', color:'var(--green)', dot:'#16a34a' },
  { id:'引流工具', color:'var(--purple)', dot:'#7c3aed' },
  { id:'教研智课', color:'var(--teal)', dot:'#0d9488' },
  { id:'课程服务', color:'var(--pink)', dot:'#db2777' },
];

let toolsData = [];
let activeCategory = null;

async function init() {
  try {
    const res = await fetch('tools.json');
    toolsData = await res.json();
    renderSidebar();
    renderContent(toolsData);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">&#x26A0;</div><p>加载失败，请刷新页面</p></div>';
  }
}

function getCategoryTools(category) {
  return toolsData.filter(t => t.category === category);
}

function getCount(category) {
  return getCategoryTools(category).length;
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = CATEGORIES.map(cat => {
    const count = getCount(cat.id);
    const isActive = activeCategory === cat.id;
    const emptyClass = count === 0 ? ' empty' : '';
    const activeClass = isActive ? ' active' : '';
    return `<a href="#cat-${cat.id}" class="${activeClass}${emptyClass}" data-cat="${cat.id}" onclick="scrollToCategory('${cat.id}')">
      <span style="display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:50%;background:${cat.dot};flex-shrink:0;"></span>${cat.id}</span>
      <span class="count">${count}</span>
    </a>`;
  }).join('');
}

function renderContent(data) {
  const container = document.getElementById('content');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">&#x1F50D;</div><p>没有匹配的工具</p></div>';
    return;
  }

  let html = '';
  CATEGORIES.forEach(cat => {
    const items = data.filter(t => t.category === cat.id);
    if (items.length === 0) {
      html += `<section class="category-section" id="cat-${cat.id}">
        <div class="category-header"><span class="category-dot" style="background:${cat.dot}"></span><h2>${cat.id}</h2><span class="count-badge">（暂无工具，敬请期待）</span></div>
        <div class="placeholder-cards">
          <div class="placeholder-card"><div class="dot">&#x1F4A1;</div><div class="txt">后续将在此添加工具</div></div>
        </div>
      </section>`;
    } else {
      html += `<section class="category-section" id="cat-${cat.id}">
        <div class="category-header"><span class="category-dot" style="background:${cat.dot}"></span><h2>${cat.id}</h2><span class="count-badge">${items.length} 个工具</span></div>
        <div class="cards">`;
      items.forEach(tool => {
        const external = tool.external ? ' target="_blank" rel="noopener"' : '';
        const badge = tool.external ? '<span class="card-external">&#x2197; 外部链接</span>' : '';
        const tags = tool.tags ? tool.tags.map(t => `<span class="card-tag">${t}</span>`).join('') : '';
        html += `<a href="${tool.url}" class="card"${external}>
          <div class="card-title">${tool.title}</div>
          <div class="card-desc">${tool.desc}</div>
          ${tags ? '<div class="card-tags">' + tags + '</div>' : ''}
          ${badge}
        </a>`;
      });
      html += '</div></section>';
    }
  });
  container.innerHTML = html;
}

function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.classList.toggle('visible', query.length > 0);

  if (!query) {
    activeCategory = null;
    renderSidebar();
    renderContent(toolsData);
    return;
  }

  const filtered = toolsData.filter(t =>
    t.title.toLowerCase().includes(query) ||
    t.desc.toLowerCase().includes(query) ||
    (t.tags && t.tags.some(tag => tag.toLowerCase().includes(query))) ||
    t.category.toLowerCase().includes(query)
  );

  activeCategory = null;
  renderSidebar();
  renderContent(filtered);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  activeCategory = null;
  renderSidebar();
  renderContent(toolsData);
}

function scrollToCategory(catId) {
  activeCategory = catId;
  renderSidebar();
  const el = document.getElementById('cat-' + catId);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  if (window.innerWidth <= 768) closeSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSidebar();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

document.addEventListener('click', e => {
  if (e.target.closest('.sidebar-nav a')) {
    if (window.innerWidth <= 768) closeSidebar();
  }
});

init();
</script>
</body>
</html>
