<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环球网校 · 运营工具箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Variables ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  /* Palette */
  --bg-deep:     #0a0e17;
  --bg-panel:    #111620;
  --bg-card:     #161b26;
  --bg-card-hover: #1a2030;
  --bg-sidebar:  #0d1117;
  --border:      #1e2a3a;
  --border-glow: #253348;
  --text-primary: #e4ecf7;
  --text-secondary: #7b8ca3;
  --text-dim:    #4a5568;
  
  /* Accent */
  --tech-blue:   #00d4ff;
  --tech-blue-dim: rgba(0,212,255,.12);
  --warning:     #ff6b35;
  --warning-dim: rgba(255,107,53,.12);
  --safety-green: #00e676;
  --safety-dim:  rgba(0,230,118,.12);
  --amber:       #ffb300;
  --amber-dim:   rgba(255,179,0,.12);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167,139,250,.12);
  --rose:        #fb7185;
  --rose-dim:    rgba(251,113,133,.12);
  
  /* Layout */
  --sidebar-w: 240px;
  --radius: 8px;
  --radius-lg: 12px;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

html { scroll-behavior: smooth; background: var(--bg-deep); }
body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== Background Hex Grid ===== */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: 
    /* horizontal lines */
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,212,255,.03) 39px, rgba(0,212,255,.03) 40px),
    /* vertical lines */
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,212,255,.03) 39px, rgba(0,212,255,.03) 40px);
  z-index: 0; pointer-events: none;
}

/* subtle diagonal scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,212,255,.008) 2px,
    rgba(0,212,255,.008) 4px
  );
  z-index: 0; pointer-events: none;
}

/* ===== Layout ===== */
.layout { display:flex; min-height:100vh; position:relative; z-index:1; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  position: fixed; top: 0; left: 0; height: 100vh;
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter: blur(12px);
}
.sidebar::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--tech-blue-dim), transparent);
  opacity: .6;
}

.sidebar-header {
  padding: 28px 22px 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.sidebar-header::after {
  content: '';
  position: absolute; bottom: -1px; left: 22px; right: 22px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,.3), transparent);
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--tech-blue), #0098b0);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 16px; font-weight: 700;
  color: #fff;
  box-shadow: 0 0 16px rgba(0,212,255,.25);
}

.sidebar-header h1 {
  font-size: 14px; font-weight: 700; color: var(--text-primary);
  letter-spacing: .02em;
  font-family: var(--font-mono);
}
.sidebar-header p {
  font-size: 11px; color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: .04em;
}

.sidebar-nav { flex:1; overflow-y:auto; padding:12px 0; }
.sidebar-nav a {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 22px;
  font-size: 13px; color: var(--text-secondary);
  text-decoration: none;
  font-family: var(--font-sans);
  transition: all .2s;
  border-left: 2px solid transparent;
  position: relative;
  letter-spacing: .01em;
}
.sidebar-nav a:hover {
  background: rgba(0,212,255,.04);
  color: var(--text-primary);
}
.sidebar-nav a.active {
  background: rgba(0,212,255,.06);
  color: var(--tech-blue);
  border-left-color: var(--tech-blue);
  font-weight: 500;
}
.sidebar-nav a.active::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--tech-blue);
  box-shadow: 0 0 10px rgba(0,212,255,.4);
}

.sidebar-nav a .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  transition: box-shadow .3s;
}
.sidebar-nav a.active .dot {
  box-shadow: 0 0 8px var(--tech-blue);
  animation: dotPulse 2s infinite;
}

.sidebar-nav a .count {
  font-size: 10px; font-family: var(--font-mono);
  color: var(--text-dim);
  background: rgba(255,255,255,.04);
  padding: 2px 8px; border-radius: 10px;
  min-width: 24px; text-align: center;
  border: 1px solid var(--border);
}
.sidebar-nav a.active .count {
  background: rgba(0,212,255,.1);
  border-color: rgba(0,212,255,.25);
  color: var(--tech-blue);
}
.sidebar-nav a.empty { opacity: .45; cursor: default; }
.sidebar-nav a.empty:hover { background: transparent; color: var(--text-secondary); }

@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 4px rgba(0,212,255,.5); }
  50% { box-shadow: 0 0 14px rgba(0,212,255,.8); }
}

/* Sidebar bottom status bar */
.sidebar-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 8px;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--safety-green);
  box-shadow: 0 0 6px rgba(0,230,118,.5);
  animation: dotPulseGreen 2s infinite;
}
@keyframes dotPulseGreen {
  0%, 100% { box-shadow: 0 0 4px rgba(0,230,118,.5); }
  50% { box-shadow: 0 0 10px rgba(0,230,118,.7); }
}

/* ===== Main Content ===== */
.main { margin-left: var(--sidebar-w); flex:1; min-width:0; }

/* Top bar with dashboard stats */
.topbar {
  position: sticky; top: 0;
  background: rgba(17,22,32,.85);
  backdrop-filter: blur(16px);
  z-index: 50;
  padding: 20px 32px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 24px;
  flex-wrap: wrap;
}
.topbar::after {
  content: '';
  position: absolute; bottom: -1px; left: 32px; right: 32px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,.2), transparent);
}

/* Dashboard stats row */
.dash-stats {
  display: flex; gap: 18px; flex-shrink: 0;
}
.dash-stat {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-secondary);
}
.dash-stat .val {
  font-size: 18px; font-weight: 600;
  color: var(--tech-blue);
  line-height: 1;
}
.dash-stat .label { font-size: 10px; color: var(--text-dim); }

/* Search */
.search-wrap {
  position: relative;
  flex: 1; min-width: 220px; max-width: 480px;
}
.search-wrap input {
  width: 100%;
  padding: 10px 14px 10px 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px; font-family: var(--font-mono);
  color: var(--text-primary);
  outline: none;
  transition: all .25s;
  caret-color: var(--tech-blue);
}
.search-wrap input::placeholder { color: var(--text-dim); }
.search-wrap input:focus {
  border-color: rgba(0,212,255,.4);
  box-shadow: 0 0 0 3px rgba(0,212,255,.06), 0 0 16px rgba(0,212,255,.04);
}
.search-wrap .search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 15px;
  pointer-events: none;
  transition: color .25s;
}
.search-wrap input:focus ~ .search-icon { color: var(--tech-blue); }
.search-wrap .clear-btn {
  position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-dim);
  cursor: pointer; font-size: 14px;
  padding: 4px 6px; border-radius: 4px;
  display: none;
  transition: all .15s;
  font-family: var(--font-mono);
}
.search-wrap .clear-btn.visible { display: block; }
.search-wrap .clear-btn:hover {
  color: var(--text-primary);
  background: rgba(255,255,255,.06);
}

/* Shortcut hint */
.shortcut-hint {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-dim);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ===== Content ===== */
.content { padding: 0 32px 48px; }

.category-section {
  margin-top: 36px;
  animation: sectionFadeIn .5s ease backwards;
}
.category-section:first-child { margin-top: 28px; }

@keyframes sectionFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.category-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 18px;
}
.category-header .cat-icon {
  width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  transform: rotate(45deg);
}
.category-header h2 {
  font-size: 15px; font-weight: 600;
  letter-spacing: .03em;
  font-family: var(--font-mono);
  color: var(--text-primary);
}
.category-header .count-badge {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--text-dim);
}
.category-section::before {
  content: '';
  position: absolute; left: 0; width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin-top: -20px;
  opacity: .4;
}
.category-section:first-child::before { display: none; }

/* ===== Cards Grid ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.card {
  display: flex; flex-direction: column;
  padding: 20px 22px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  text-decoration: none; color: inherit;
  position: relative; overflow: hidden;
  transition: all .3s cubic-bezier(.4,0,.2,1);
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(0,212,255,.04) 0%, transparent 50%, rgba(0,212,255,.02) 100%);
  opacity: 0;
  transition: opacity .3s;
}
.card::after {
  content: '';
  position: absolute; top: -1px; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,.3), transparent);
  opacity: 0;
  transition: opacity .3s;
}
.card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-glow);
  transform: translateY(-2px);
  box-shadow: 0 4px 24px rgba(0,0,0,.3), 0 0 20px rgba(0,212,255,.06);
}
.card:hover::before { opacity: 1; }
.card:hover::after { opacity: 1; }

.card-top {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 8px;
}

.card-icon {
  width: 36px; height: 36px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  border: 1px solid;
}

.card-title {
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  letter-spacing: .01em;
  line-height: 1.4;
  flex: 1;
}
.card-desc {
  font-size: 12px; color: var(--text-secondary);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
}

.card-tags {
  display: flex; gap: 6px; margin-top: auto;
  flex-wrap: wrap;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,.04);
}
.card-tag {
  font-size: 10px; font-family: var(--font-mono);
  padding: 3px 8px; border-radius: 4px;
  background: rgba(255,255,255,.03);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,.05);
  letter-spacing: .02em;
  transition: all .2s;
}
.card:hover .card-tag {
  background: rgba(0,212,255,.06);
  border-color: rgba(0,212,255,.12);
  color: var(--tech-blue);
}

.card-corner {
  position: absolute; bottom: 0; right: 0;
  width: 40px; height: 40px;
  background: linear-gradient(135deg, transparent 50%, rgba(0,212,255,.03) 50%);
  border-radius: 0 0 var(--radius-lg) 0;
  opacity: 0;
  transition: opacity .3s;
}
.card:hover .card-corner { opacity: 1; }

/* Card color variants per category */
.cat-op .card { border-left: 2px solid transparent; }
.cat-op .card:hover { border-color: var(--tech-blue); }
.cat-op .card-icon { background: var(--tech-blue-dim); border-color: rgba(0,212,255,.15); color: var(--tech-blue); }

.cat-sl .card { border-left: 2px solid transparent; }
.cat-sl .card:hover { border-color: var(--warning); }
.cat-sl .card-icon { background: var(--warning-dim); border-color: rgba(255,107,53,.15); color: var(--warning); }

.cat-sj .card { border-left: 2px solid transparent; }
.cat-sj .card:hover { border-color: var(--safety-green); }
.cat-sj .card-icon { background: var(--safety-dim); border-color: rgba(0,230,118,.15); color: var(--safety-green); }

.cat-yl .card { border-left: 2px solid transparent; }
.cat-yl .card:hover { border-color: var(--purple); }
.cat-yl .card-icon { background: var(--purple-dim); border-color: rgba(167,139,250,.15); color: var(--purple); }

.cat-ai .card { border-left: 2px solid transparent; }
.cat-ai .card:hover { border-color: var(--amber); }
.cat-ai .card-icon { background: var(--amber-dim); border-color: rgba(255,179,0,.15); color: var(--amber); }

.cat-sv .card { border-left: 2px solid transparent; }
.cat-sv .card:hover { border-color: var(--rose); }
.cat-sv .card-icon { background: var(--rose-dim); border-color: rgba(251,113,133,.15); color: var(--rose); }

/* ===== Empty / Placeholder states ===== */
.empty-state {
  text-align: center; padding: 64px 20px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 36px; margin-bottom: 14px; opacity: .4; }
.empty-state p { font-size: 13px; font-family: var(--font-mono); }

.placeholder-cards {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.placeholder-card {
  padding: 28px 20px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-lg);
  text-align: center;
  background: rgba(255,255,255,.01);
}
.placeholder-card .dot { font-size: 22px; color: var(--text-dim); margin-bottom: 10px; opacity: .5; }
.placeholder-card .txt { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }

.no-results { display:none; text-align:center; padding:56px 20px; }
.no-results.visible { display:block; }
.no-results .icon { font-size: 36px; margin-bottom: 12px; opacity: .3; }
.no-results p { font-size: 13px; color: var(--text-dim); }

/* ===== Mobile ===== */
.mobile-toggle {
  display: none;
  position: fixed; top: 14px; left: 14px; z-index: 200;
  width: 40px; height: 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer; padding: 0;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
}
.mobile-toggle span { display:block; width:18px; height:2px; background:var(--text-primary); border-radius:1px; position:relative; }
.mobile-toggle span::before, .mobile-toggle span::after { content:''; display:block; width:18px; height:2px; background:var(--text-primary); border-radius:1px; position:absolute; left:0; transition:all .25s; }
.mobile-toggle span::before { top:-6px; }
.mobile-toggle span::after { bottom:-6px; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; }

@media (max-width:1024px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
  .placeholder-cards { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width:768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .topbar { padding: 16px; flex-direction: column; gap: 10px; align-items: stretch; }
  .topbar { padding-top: 60px; }
  .content { padding: 0 16px 32px; }
  .cards { grid-template-columns: 1fr; }
  .placeholder-cards { grid-template-columns: 1fr; }
  .mobile-toggle { display: flex; }
  .overlay.visible { display: block; }
  .dash-stats { justify-content: center; }
  .search-wrap { max-width: none; }
  .shortcut-hint { display: none; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="mobile-toggle" id="menuToggle" onclick="toggleSidebar()"><span></span></button>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">HQ</div>
        <h1>运营工具箱</h1>
      </div>
      <p>hqza.work &nbsp;//&nbsp; 在线运行</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <span class="status-dot"></span>
      <span id="sidebarStatus">系统就绪</span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="dash-stats" id="dashStats"></div>
      <div class="search-wrap">
        <span class="search-icon">&#8981;</span>
        <input type="text" id="searchInput" placeholder="搜索工具..." oninput="handleSearch()">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">ESC</button>
      </div>
      <div class="shortcut-hint">⌘K 搜索</div>
    </div>
    <div class="content" id="content">
      <div class="empty-state"><div class="icon">◈</div><p>加载中...</p></div>
    </div>
  </main>
</div>

<script>
// ===== Category definitions =====
const CATEGORIES = [
  { id:'运营策略', cls:'cat-op', dot:'#00d4ff', emoji:'⚙' },
  { id:'销售支持', cls:'cat-sl', dot:'#ff6b35', emoji:'◈' },
  { id:'数据分析', cls:'cat-sj', dot:'#00e676', emoji:'◆' },
  { id:'引流工具', cls:'cat-yl', dot:'#a78bfa', emoji:'◇' },
  { id:'教研智课', cls:'cat-ai', dot:'#ffb300', emoji:'✦' },
  { id:'课程服务', cls:'cat-sv', dot:'#fb7185', emoji:'▣' },
];

let toolsData = [];
let activeCategory = null;

// ===== Init =====
async function init() {
  try {
    const res = await fetch('tools.json');
    toolsData = await res.json();
    renderSidebar();
    renderContent(toolsData);
    renderStats(toolsData);
    updateSidebarStatus(toolsData.length);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="icon">⚠</div><p>数据加载失败，请刷新页面</p></div>';
  }
}

function getCategoryTools(catId) { return toolsData.filter(t => t.category === catId); }

// ===== Dashboard Stats =====
function renderStats(data) {
  const total = data.length;
  const cats = CATEGORIES.filter(c => data.some(t => t.category === c.id)).length;
  
  document.getElementById('dashStats').innerHTML = `
    <div class="dash-stat">
      <div style="display:flex;flex-direction:column;align-items:flex-end;">
        <div class="val" id="statTotal">0</div>
        <div class="label">工具总数</div>
      </div>
    </div>
    <div class="dash-stat">
      <div style="display:flex;flex-direction:column;align-items:flex-end;">
        <div class="val" id="statCats" style="color:var(--safety-green)">0</div>
        <div class="label">活跃分类</div>
      </div>
    </div>
  `;
  animateNumber('statTotal', total);
  animateNumber('statCats', cats);
}

function animateNumber(id, target) {
  const el = document.getElementById(id);
  let current = 0;
  const step = Math.max(1, Math.ceil(target / 30));
  const timer = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current;
    if (current >= target) clearInterval(timer);
  }, 40);
}

function updateSidebarStatus(total) {
  document.getElementById('sidebarStatus').textContent =
    `共 ${total} 个模块 · 运行中`;
}

// ===== Sidebar =====
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = CATEGORIES.map(cat => {
    const count = getCategoryTools(cat.id).length;
    const isActive = activeCategory === cat.id;
    const emptyCls = count === 0 ? ' empty' : '';
    const activeCls = isActive ? ' active' : '';
    return `<a href="#cat-${cat.id}" class="${activeCls}${emptyCls}" data-cat="${cat.id}" onclick="scrollToCategory('${cat.id}')" title="${cat.id} · ${count} 个工具">
      <span style="display:flex;align-items:center;gap:10px;">
        <span class="dot" style="background:${cat.dot};${isActive?'box-shadow:0 0 8px '+cat.dot+';animation:dotPulse 2s infinite;':''}"></span>
        ${cat.id}
      </span>
      <span class="count">${count}</span>
    </a>`;
  }).join('');
}

// ===== Content =====
function renderContent(data) {
  const container = document.getElementById('content');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">⌕</div><p>未找到匹配的工具</p></div>';
    return;
  }

  let html = '';
  CATEGORIES.forEach(cat => {
    const items = data.filter(t => t.category === cat.id);
    html += `<section class="category-section ${cat.cls}" id="cat-${cat.id}">`;
    html += `<div class="category-header">
      <span class="cat-icon" style="background:${cat.dot};box-shadow:0 0 8px ${cat.dot}44;"></span>
      <h2>${cat.id}</h2>
      <span class="count-badge">${items.length > 0 ? items.length + ' MODULE' + (items.length>1?'S':'') : '— PENDING'}</span>
    </div>`;

    if (items.length === 0) {
      html += `<div class="placeholder-cards">
        <div class="placeholder-card"><div class="dot">${cat.emoji}</div><div class="txt">待部署模块</div></div>
      </div>`;
    } else {
      html += '<div class="cards">';
      items.forEach(tool => {
        const tags = tool.tags
          ? tool.tags.map(t => `<span class="card-tag">#${t}</span>`).join('')
          : '';
        html += `<a href="${tool.url}" class="card" title="${tool.title}">
          <div class="card-top">
            <span class="card-icon">${cat.emoji}</span>
            <span class="card-title">${tool.title}</span>
          </div>
          <div class="card-desc">${tool.desc}</div>
          ${tags ? '<div class="card-tags">' + tags + '</div>' : ''}
          <div class="card-corner"></div>
        </a>`;
      });
      html += '</div>';
    }
    html += '</section>';
  });
  container.innerHTML = html;
}

// ===== Search =====
function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const clearBtn = document.getElementById('clearBtn');
  
  if (query.length > 0) {
    clearBtn.classList.add('visible');
    clearBtn.textContent = '✕';
  } else {
    clearBtn.classList.remove('visible');
    clearBtn.textContent = 'ESC';
    activeCategory = null;
    renderContent(toolsData);
    renderSidebar();
    return;
  }

  const filtered = toolsData.filter(t =>
    t.title.toLowerCase().includes(query) ||
    t.desc.toLowerCase().includes(query) ||
    (t.tags && t.tags.some(tag => tag.toLowerCase().includes(query))) ||
    t.category.toLowerCase().includes(query)
  );

  activeCategory = null;
  renderSidebar();
  renderContent(filtered);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  activeCategory = null;
  renderContent(toolsData);
  renderSidebar();
}

// ===== Navigation =====
function scrollToCategory(catId) {
  activeCategory = catId;
  renderSidebar();
  const el = document.getElementById('cat-' + catId);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  if (window.innerWidth <= 768) closeSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.activeElement === document.getElementById('searchInput') &&
        document.getElementById('searchInput').value) {
      clearSearch();
    } else {
      closeSidebar();
    }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

document.addEventListener('click', e => {
  if (e.target.closest('.sidebar-nav a')) {
    if (window.innerWidth <= 768) closeSidebar();
  }
});

init();
</script>
</body>
</html>
