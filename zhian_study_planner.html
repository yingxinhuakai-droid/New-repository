<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注安考生报考规划助手</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f5f5; color: #333; line-height: 1.6;
        }
        .page { display: none; min-height: 100vh; padding-bottom: 80px; }
        .page.active { display: block; }

        /* 欢迎页 */
        .welcome-page {
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 40px 20px;
        }
        .welcome-page.active { display: flex; }
        .welcome-icon { font-size: 80px; margin-bottom: 20px; }
        .welcome-title { font-size: 26px; font-weight: bold; margin-bottom: 15px; }
        .welcome-desc { font-size: 15px; opacity: 0.9; margin-bottom: 40px; max-width: 300px; line-height: 1.8; }
        .start-btn {
            background: white; color: #07c160; border: none;
            padding: 15px 50px; font-size: 18px; font-weight: bold;
            border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 问答页 */
        .question-page { background: white; }
        .question-header {
            background: #07c160; color: white; padding: 18px 20px;
            font-size: 17px; font-weight: bold; position: sticky; top: 0; z-index: 10;
        }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.3); margin-top: 10px; border-radius: 2px; }
        .progress-fill { height: 100%; background: white; border-radius: 2px; transition: width 0.3s; }
        .question-body { padding: 30px 20px; }
        .question-text { font-size: 19px; font-weight: bold; margin-bottom: 25px; color: #333; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: #f8f8f8; border: 2px solid #e8e8e8; border-radius: 10px;
            padding: 16px 18px; font-size: 15px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .option:hover { border-color: #07c160; background: #f0f9f4; }
        .option.selected { border-color: #07c160; background: #e8f5ec; }
        .option-radio {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .option.selected .option-radio { border-color: #07c160; background: #07c160; }
        .option.selected .option-radio::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .option-checkbox {
            width: 22px; height: 22px; border-radius: 4px; border: 2px solid #ccc;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .option.selected .option-checkbox { border-color: #07c160; background: #07c160; }
        .option.selected .option-checkbox::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .option-label { flex: 1; }
        .next-btn {
            background: #07c160; color: white; border: none; width: 100%;
            padding: 15px; border-radius: 10px; font-size: 17px; font-weight: bold;
            cursor: pointer; margin-top: 30px; display: none;
        }
        .next-btn.show { display: block; }

        /* 加载页 */
        .loading-page { display: none; flex-direction: column; justify-content: center; align-items: center; background: white; }
        .loading-page.active { display: flex; }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid #f3f3f3;
            border-top: 4px solid #07c160; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 25px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 16px; color: #666; }

        /* 结果页 */
        .result-page { background: #f5f5f5; }
        .result-header { background: #07c160; color: white; padding: 20px; }
        .result-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .result-subtitle { font-size: 13px; opacity: 0.85; }
        .result-content { padding: 12px; }

        .result-card {
            background: white; border-radius: 12px; padding: 18px;
            margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-title {
            font-size: 17px; font-weight: bold; color: #07c160;
            margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
        }

        /* 报考建议 */
        .subject-item {
            background: #f8f8f8; border-radius: 8px; padding: 14px; margin-bottom: 10px;
        }
        .subject-name { font-weight: bold; color: #07c160; font-size: 16px; margin-bottom: 6px; }
        .subject-reason { font-size: 13px; color: #888; line-height: 1.6; }
        .tag {
            display: inline-block; padding: 3px 10px; border-radius: 4px;
            font-size: 11px; margin-right: 6px; margin-top: 8px;
        }
        .tag-green { background: #e8f5ec; color: #07c160; }
        .tag-orange { background: #fff3e0; color: #ff9800; }
        .tag-red { background: #ffebee; color: #f44336; }

        /* 个性化备考规划 */
        .plan-phase {
            background: #f8f8f8; border-radius: 10px; padding: 16px;
            margin-bottom: 12px; position: relative;
        }
        .plan-phase-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .plan-phase-num {
            background: #07c160; color: white; width: 28px; height: 28px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 14px; font-weight: bold; flex-shrink: 0;
        }
        .plan-phase-title { font-weight: bold; font-size: 15px; color: #333; }
        .plan-phase-time { font-size: 12px; color: #999; margin-left: auto; }
        .plan-phase-content { font-size: 14px; color: #555; line-height: 1.8; }
        .plan-phase-tasks {
            margin-top: 10px; padding: 10px; background: white;
            border-radius: 6px; font-size: 13px; color: #666; line-height: 2;
        }
        .plan-phase-tasks li { margin-bottom: 3px; }

        /* 推荐课程 */
        .course-item {
            background: #f8f8f8; border-radius: 8px; padding: 14px;
            margin-bottom: 10px; border-left: 4px solid #07c160;
        }
        .course-name { font-weight: bold; color: #07c160; font-size: 15px; margin-bottom: 6px; }
        .course-desc { font-size: 13px; color: #666; line-height: 1.7; }
        .course-match { font-size: 12px; color: #ff9800; margin-top: 8px; }

        /* 时间分配 */
        .time-allocation { margin-top: 10px; }
        .time-phase {
            display: flex; align-items: stretch; margin-bottom: 12px;
            background: #f8f8f8; border-radius: 8px; overflow: hidden;
        }
        .phase-left {
            background: #07c160; color: white; padding: 12px 15px;
            min-width: 80px; display: flex; align-items: center;
            justify-content: center; font-size: 13px; font-weight: bold;
        }
        .phase-right { padding: 12px 15px; flex: 1; font-size: 14px; color: #555; line-height: 1.8; }

        /* 复习重点 */
        .focus-item {
            background: #f8f8f8; border-radius: 8px; padding: 14px;
            margin-bottom: 10px; border-left: 4px solid #07c160;
        }
        .focus-subject { font-weight: bold; color: #07c160; margin-bottom: 6px; font-size: 15px; }
        .focus-detail { font-size: 13px; color: #666; line-height: 1.8; }

        /* 方法卡片 */
        .method-card {
            background: #f8f8f8; border-radius: 8px; padding: 14px;
            margin-bottom: 10px;
        }
        .method-title { font-weight: bold; color: #333; margin-bottom: 8px; font-size: 15px; }
        .method-content { font-size: 13px; color: #666; line-height: 1.8; }
        .method-content li { margin-bottom: 4px; }

        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            display: flex; border-top: 1px solid #e8e8e8; z-index: 100;
        }
        .nav-btn {
            flex: 1; padding: 10px; text-align: center; background: none;
            border: none; font-size: 12px; color: #999; cursor: pointer;
        }
        .nav-btn .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-btn.active { color: #07c160; font-weight: bold; }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }

        /* 用户画像 */
        .user-profile {
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            color: white; border-radius: 12px; padding: 18px; margin-bottom: 15px;
        }
        .profile-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        .profile-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .profile-tag {
            background: rgba(255,255,255,0.2); padding: 5px 12px;
            border-radius: 20px; font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- 第1页：欢迎页 -->
    <div id="page-welcome" class="page welcome-page active">
        <div class="welcome-icon">📚</div>
        <div class="welcome-title">注安报考规划助手</div>
        <div class="welcome-desc">输入你的情况，获取专属备考规划与课程推荐</div>
        <button class="start-btn" onclick="startQuiz()">开始规划</button>
    </div>

    <!-- 第2页：问答页 -->
    <div id="page-question" class="page question-page">
        <div class="question-header">
            <div>报考规划助手</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div class="question-body">
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options-container"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一步</button>
        </div>
    </div>

    <!-- 第3页：加载页 -->
    <div id="page-loading" class="page loading-page">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在为你生成专属备考方案...</div>
    </div>

    <!-- 第4页：结果页 -->
    <div id="page-result" class="page result-page">
        <div class="result-header">
            <div class="result-title">🎯 你的专属备考方案</div>
            <div class="result-subtitle" id="result-subtitle"></div>
        </div>
        <div class="result-content">

            <!-- 用户画像 -->
            <div class="user-profile fade-in" id="user-profile"></div>

            <!-- 报考建议 -->
            <div class="result-card fade-in" style="animation-delay:0.05s;">
                <div class="card-title"><span>📋</span><span>报考建议</span></div>
                <div id="subject-recommendation"></div>
            </div>

            <!-- 个性化备考规划 -->
            <div class="result-card fade-in" style="animation-delay:0.1s;">
                <div class="card-title"><span>🗓️</span><span>你的备考规划</span></div>
                <div id="personalized-plan"></div>
            </div>

            <!-- 推荐课程 -->
            <div class="result-card fade-in" style="animation-delay:0.15s;">
                <div class="card-title"><span>🎓</span><span>推荐课程</span></div>
                <div id="course-recommendation"></div>
            </div>

            <!-- 时间分配建议 -->
            <div class="result-card fade-in" style="animation-delay:0.2s;">
                <div class="card-title"><span>⏰</span><span>时间分配建议</span></div>
                <div class="time-allocation" id="time-allocation"></div>
            </div>

            <!-- 复习重点 -->
            <div class="result-card fade-in" style="animation-delay:0.25s;">
                <div class="card-title"><span>🎯</span><span>各科目复习重点</span></div>
                <div id="study-focus"></div>
            </div>

            <!-- 真题利用方法 -->
            <div class="result-card fade-in" style="animation-delay:0.3s;">
                <div class="card-title"><span>📝</span><span>真题利用方法</span></div>
                <div id="past-paper-method"></div>
            </div>

            <!-- 错题整理方法 -->
            <div class="result-card fade-in" style="animation-delay:0.35s;">
                <div class="card-title"><span>📒</span><span>错题整理方法</span></div>
                <div id="error-note-method"></div>
            </div>

            <!-- 心态调整 -->
            <div class="result-card fade-in" style="animation-delay:0.4s;">
                <div class="card-title"><span>💪</span><span>心态调整建议</span></div>
                <div id="mindset-tips"></div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav hidden" id="bottom-nav">
        <button class="nav-btn active" onclick="showPage('page-result')">
            <span class="nav-icon">📊</span><span>方案</span>
        </button>
        <button class="nav-btn" onclick="shareResult()">
            <span class="nav-icon">📤</span><span>分享</span>
        </button>
        <button class="nav-btn" onclick="restartQuiz()">
            <span class="nav-icon">🔄</span><span>重测</span>
        </button>
    </div>

<script>
const PRACTICE_MAP = {
    'coal': '煤矿安全', 'chemical': '化工安全', 'metal': '金属非金属矿山',
    'smelting': '金属冶炼', 'road': '道路运输', 'other': '其他安全'
};

const BACKGROUND_LABEL = { 'zero': '零基础', 'some_exp': '有安全经验', 'related_major': '安全专业', 'taken_before': '考过未过' };
const TIME_LABEL = { 'less_1h': '每天&lt;1小时', '1_2h': '每天1-2小时', '2_3h': '每天2-3小时', 'more_3h': '每天3+小时' };
const TARGET_LABEL = { '1_year': '今年拿证', '2_years': '两年拿证', 'no_rush': '稳扎稳打' };

let currentQuestion = 0;
let answers = {};

const questions = [
    {
        id: 'background',
        text: '你目前的基础情况是？',
        options: [
            { value: 'zero', label: '零基础，完全没接触过' },
            { value: 'some_exp', label: '有安全相关工作经验' },
            { value: 'related_major', label: '安全相关专业毕业' },
            { value: 'taken_before', label: '之前考过但没通过' }
        ],
        type: 'single'
    },
    {
        id: 'daily_time',
        text: '你每天大概能花多少时间学习？',
        options: [
            { value: 'less_1h', label: '1小时以内' },
            { value: '1_2h', label: '1-2小时' },
            { value: '2_3h', label: '2-3小时' },
            { value: 'more_3h', label: '3小时以上' }
        ],
        type: 'single'
    },
    {
        id: 'purpose',
        text: '你报考注安的主要目的是？（可多选）',
        options: [
            { value: 'promotion', label: '升职加薪' },
            { value: 'career_change', label: '转行做安全' },
            { value: 'company_require', label: '公司要求' },
            { value: 'personal_growth', label: '个人提升' }
        ],
        type: 'multiple'
    },
    {
        id: 'first_time',
        text: '你是否是第一次报考注安？',
        options: [
            { value: 'yes', label: '是，第一次考' },
            { value: 'no', label: '不是，之前考过' }
        ],
        type: 'single'
    },
    {
        id: 'failed_subjects',
        text: '之前考试哪些科目没通过？（可多选）',
        options: [
            { value: '法律法规', label: '安全生产法律法规' },
            { value: '安全管理', label: '安全生产管理' },
            { value: '技术基础', label: '安全生产技术基础' },
            { value: '实务', label: '安全生产专业实务' }
        ],
        type: 'multiple',
        showIf: (a) => a.first_time === 'no'
    },
    {
        id: 'practice_subject',
        text: '你想报考哪个专业实务科目？',
        options: [
            { value: 'coal', label: '煤矿安全' },
            { value: 'chemical', label: '化工安全' },
            { value: 'metal', label: '金属非金属矿山安全' },
            { value: 'smelting', label: '金属冶炼安全' },
            { value: 'road', label: '道路运输安全' },
            { value: 'other', label: '其他安全' }
        ],
        type: 'single'
    },
    {
        id: 'target_year',
        text: '你希望用多长时间拿证？',
        options: [
            { value: '1_year', label: '今年就拿证（一次考4科）' },
            { value: '2_years', label: '两年拿证（分两次考）' },
            { value: 'no_rush', label: '不着急，稳扎稳打' }
        ],
        type: 'single'
    }
];

// ===== 函数 =====
function startQuiz() {
    currentQuestion = 0;
    answers = {};
    showPage('page-question');
    displayQuestion();
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if (pageId === 'page-result') {
        document.getElementById('bottom-nav').classList.remove('hidden');
    }
}

function displayQuestion() {
    while (currentQuestion < questions.length && questions[currentQuestion].showIf && !questions[currentQuestion].showIf(answers)) {
        currentQuestion++;
    }
    if (currentQuestion >= questions.length) {
        showLoading();
        return;
    }
    const q = questions[currentQuestion];
    document.getElementById('question-text').textContent = q.text;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    const progress = ((currentQuestion) / questions.length * 100).toFixed(0);
    document.getElementById('progress-fill').style.width = progress + '%';
    q.options.forEach((opt) => {
        const div = document.createElement('div');
        div.className = 'option';
        const iconClass = q.type === 'multiple' ? 'option-checkbox' : 'option-radio';
        div.innerHTML = `<div class="${iconClass}"></div><div class="option-label">${opt.label}</div>`;
        div.onclick = () => selectOption(opt.value, q.type, div);
        container.appendChild(div);
    });
    document.getElementById('next-btn').classList.remove('show');
}

function selectOption(value, type, element) {
    if (type === 'single') {
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        element.classList.add('selected');
        answers[questions[currentQuestion].id] = value;
    } else {
        element.classList.toggle('selected');
        if (!answers[questions[currentQuestion].id]) {
            answers[questions[currentQuestion].id] = [];
        }
        const arr = answers[questions[currentQuestion].id];
        const idx = arr.indexOf(value);
        if (idx > -1) arr.splice(idx, 1);
        else arr.push(value);
    }
    document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion >= questions.length) {
        showLoading();
    } else {
        displayQuestion();
    }
}

function showLoading() {
    showPage('page-loading');
    setTimeout(() => {
        generateResult();
        showPage('page-result');
    }, 2200);
}

// ===== 生成结果 =====
function generateResult() {
    const result = calculateResult();

    // 用户画像
    document.getElementById('user-profile').innerHTML = `
        <div class="profile-title">📊 你的情况</div>
        <div class="profile-tags">
            <span class="profile-tag">${BACKGROUND_LABEL[answers.background] || ''}</span>
            <span class="profile-tag">${TIME_LABEL[answers.daily_time] || ''}</span>
            <span class="profile-tag">${TARGET_LABEL[answers.target_year] || ''}</span>
            ${answers.first_time === 'no' ? '<span class="profile-tag">非首次报考</span>' : ''}
        </div>
    `;

    document.getElementById('result-subtitle').textContent = result.summary;

    // 报考建议
    document.getElementById('subject-recommendation').innerHTML = result.subjects.map(s => `
        <div class="subject-item">
            <div class="subject-name">${s.name}</div>
            <div class="subject-reason">${s.reason}</div>
            <div>${s.tags.map(t => `<span class="tag ${t.class}">${t.text}</span>`).join('')}</div>
        </div>
    `).join('');

    // 个性化备考规划
    document.getElementById('personalized-plan').innerHTML = result.plan.map((p, i) => `
        <div class="plan-phase">
            <div class="plan-phase-header">
                <div class="plan-phase-num">${i+1}</div>
                <div class="plan-phase-title">${p.title}</div>
                <div class="plan-phase-time">${p.time}</div>
            </div>
            <div class="plan-phase-content">${p.content}</div>
            <div class="plan-phase-tasks">
                <ul style="padding-left:18px;">${p.tasks.map(t => `<li>${t}</li>`).join('')}</ul>
            </div>
        </div>
    `).join('');

    // 推荐课程
    document.getElementById('course-recommendation').innerHTML = result.courses.map(c => `
        <div class="course-item">
            <div class="course-name">${c.name}</div>
            <div class="course-desc">${c.desc}</div>
            <div class="course-match">✅ ${c.match}</div>
        </div>
    `).join('');

    // 时间分配
    document.getElementById('time-allocation').innerHTML = result.timeAllocation.map(t => `
        <div class="time-phase">
            <div class="phase-left">${t.phase}</div>
            <div class="phase-right">${t.content}</div>
        </div>
    `).join('');

    // 复习重点
    document.getElementById('study-focus').innerHTML = result.focus.map(f => `
        <div class="focus-item">
            <div class="focus-subject">${f.subject}</div>
            <div class="focus-detail">${f.detail}</div>
        </div>
    `).join('');

    // 真题利用
    document.getElementById('past-paper-method').innerHTML = result.paperMethod;

    // 错题整理
    document.getElementById('error-note-method').innerHTML = result.errorMethod;

    // 心态调整
    document.getElementById('mindset-tips').innerHTML = result.mindset;
}

// ===== 核心计算逻辑 =====
